<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TK Income BD</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');

body {
    font-family: 'Hind Siliguri', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: #fff;
}

.card-bg {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.btn-emerald {
    background: linear-gradient(135deg,#10b981,#22c55e);
    box-shadow: 0 4px 20px rgba(16,185,129,0.4);
    transition: .2s;
}

.btn-emerald:hover {
    transform: scale(1.05);
}

.sub-page { display:none; }
.sub-page.active { display:block; }

.nav-active { color:#10b981 !important; transform:translateY(-4px); }

input,select {
    background:#000;
    border:1px solid #333;
    color:#fff;
}
</style>
</head>

<body class="max-w-md mx-auto">

<div id="loader" class="fixed inset-0 flex flex-col items-center justify-center bg-black z-50">
    <div class="w-12 h-12 border-4 border-emerald-500/20 border-t-emerald-400 rounded-full animate-spin"></div>
    <p class="text-xs text-gray-400 mt-3">Loading Secure App...</p>
</div>

<div id="app" class="opacity-0 transition">

<header class="p-4 flex justify-between items-center border-b border-white/10">
    <h1 class="text-xl font-black text-emerald-400">TK Income</h1>
    <span id="header-balance" class="text-emerald-400 font-bold">৳0</span>
</header>

<p class="text-[10px] text-center text-gray-500 mt-2">
🔒 Secure • Verified • Trusted Platform
</p>

<main class="p-4 pb-24 space-y-6">

<!-- BALANCE -->
<div class="card-bg p-8 rounded-3xl text-center relative overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-emerald-500/10"></div>
    <p class="text-xs text-gray-400">BALANCE</p>
    <h2 class="text-5xl font-black mt-2">৳ <span id="balance">0</span></h2>
    <p class="text-xs text-emerald-400 mt-2">✔ Instant Withdraw</p>
</div>

<!-- TRUST -->
<div class="grid grid-cols-3 gap-3 text-center">
    <div class="card-bg p-3 rounded-xl">
        <p class="text-xs text-gray-400">Users</p>
        <p class="font-bold text-emerald-400">10K+</p>
    </div>
    <div class="card-bg p-3 rounded-xl">
        <p class="text-xs text-gray-400">Paid</p>
        <p class="font-bold text-emerald-400">৳5L+</p>
    </div>
    <div class="card-bg p-3 rounded-xl">
        <p class="text-xs text-gray-400">Status</p>
        <p class="font-bold text-green-400">Live</p>
    </div>
</div>

<!-- TASK -->
<div>
<h3 class="text-gray-300 font-bold mb-3">Tasks</h3>
<div id="tasks" class="space-y-3"></div>
</div>

</main>

<!-- NAV -->
<nav class="fixed bottom-0 left-0 right-0 flex justify-around bg-black/70 backdrop-blur-xl p-4 border-t border-white/10">
    <button onclick="nav('home')" class="nav-active nav-btn">🏠</button>
    <button onclick="nav('refer')" class="nav-btn">👥</button>
    <button onclick="nav('wallet')" class="nav-btn">💰</button>
</nav>

</div>

<script>
let balance = 50;

function init(){
    document.getElementById("loader").style.display="none";
    document.getElementById("app").style.opacity="1";

    updateUI();
    renderTasks();
}

function updateUI(){
    document.getElementById("balance").innerText = balance;
    document.getElementById("header-balance").innerText = "৳"+balance;
}

function renderTasks(){
    let box = document.getElementById("tasks");
    box.innerHTML = "";

    for(let i=1;i<=3;i++){
        box.innerHTML += `
        <div class="card-bg p-4 rounded-xl flex justify-between items-center">
            <div>
                <p class="font-bold">Task 0${i}</p>
                <p class="text-xs text-emerald-400">৳50 Reward</p>
            </div>
            <button onclick="startTask()" class="btn-emerald px-4 py-2 rounded-lg text-xs">Start</button>
        </div>`;
    }
}

function startTask(){
    alert("Visit site & earn ৳50");
    balance += 50;
    updateUI();
}

function nav(page){
    document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("nav-active"));
    event.target.classList.add("nav-active");
}

init();
</script>

</body>
</html>
