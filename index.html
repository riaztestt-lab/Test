<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Income BD - Pro V5</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --primary: #10b981; --bg: #030712; --card: rgba(17, 24, 39, 0.7); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #f3f4f6; overflow-x: hidden; }
        .glass-card { background: var(--card); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; }
        .nav-item { transition: all 0.3s ease; }
        .nav-active { color: var(--primary); transform: translateY(-3px); }
        .sub-page { display: none; }
        .sub-page.active { display: block; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="max-w-md mx-auto">

    <header class="p-5 flex justify-between items-center sticky top-0 z-50 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20">
                <i data-lucide="zap" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="font-black text-lg tracking-tight">TK <span class="text-emerald-500">INCOME</span></h1>
        </div>
        <div class="glass-card px-4 py-2 border-emerald-500/20">
            <span id="header-balance" class="text-emerald-400 font-black text-sm">৳ 0.00</span>
        </div>
    </header>

    <main class="p-4 pb-32">
        <div id="home-page" class="sub-page active space-y-6">
            <div class="glass-card p-8 text-center border-emerald-500/10">
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Current Balance</p>
                <h2 class="text-5xl font-black text-white tracking-tighter">৳ <span id="tk-balance">0.00</span></h2>
            </div>

            <div class="space-y-4">
                <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                    <i data-lucide="layers" class="w-4 h-4 text-emerald-500"></i> Available Tasks
                </h3>
                <div id="task-list" class="space-y-4">
                    </div>
            </div>
        </div>

        <div id="refer-page" class="sub-page space-y-6">
            <div class="glass-card p-8 text-center">
                <h2 class="text-2xl font-black text-white">Referral Network</h2>
                <div class="bg-black/40 p-4 rounded-2xl border border-white/5 mt-6 break-all text-[10px] font-mono text-slate-400" id="refer-link-text">Loading...</div>
                <button onclick="copyRefer()" class="w-full bg-emerald-600 mt-4 py-4 rounded-2xl font-black text-sm shadow-lg shadow-emerald-600/20">COPY PARTNER LINK</button>
            </div>
        </div>

        <div id="wallet-page" class="sub-page space-y-6">
            <div class="glass-card p-8">
                <h2 class="text-xl font-black text-white mb-6">Withdraw</h2>
                <div class="space-y-4">
                    <select id="withdraw-method" class="w-full p-4 rounded-2xl bg-black/20 border border-white/5 outline-none text-sm"><option value="Bkash">Bkash</option><option value="Nagad">Nagad</option></select>
                    <input id="withdraw-amount" type="number" placeholder="Amount (min 500)" class="w-full p-4 rounded-2xl bg-black/20 border border-white/5 outline-none text-sm">
                    <input id="payment-number" type="number" placeholder="Account Number" class="w-full p-4 rounded-2xl bg-black/20 border border-white/5 outline-none text-sm">
                    <button id="withdraw-btn" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-sm">REQUEST PAYOUT</button>
                </div>
            </div>
        </div>

        <div id="profile-page" class="sub-page space-y-6">
            <div class="glass-card p-10 text-center">
                <div class="w-20 h-20 bg-emerald-500/20 rounded-full mx-auto flex items-center justify-center mb-4 border border-emerald-500/30"><i data-lucide="user" class="text-emerald-500 w-10 h-10"></i></div>
                <h2 id="user-name" class="text-xl font-black text-white">User</h2>
                <p id="total-ref" class="text-sm font-bold text-emerald-500 mt-2">Refers: 0</p>
                <button onclick="contactAdmin()" class="mt-6 text-xs font-bold text-slate-500 uppercase tracking-widest border border-white/10 px-6 py-2 rounded-full">Contact Support</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 glass-card p-4 flex justify-between items-center z-[100] border-white/10 shadow-2xl">
        <button onclick="navigateTo('home-page', this)" class="nav-item nav-active px-4 flex flex-col items-center gap-1"><i data-lucide="grid" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Home</span></button>
        <button onclick="navigateTo('refer-page', this)" class="nav-item px-4 flex flex-col items-center gap-1 text-slate-500"><i data-lucide="users" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Refer</span></button>
        <button onclick="navigateTo('wallet-page', this)" class="nav-item px-4 flex flex-col items-center gap-1 text-slate-500"><i data-lucide="wallet" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Wallet</span></button>
        <button onclick="navigateTo('profile-page', this)" class="nav-item px-4 flex flex-col items-center gap-1 text-slate-500"><i data-lucide="settings" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Profile</span></button>
    </nav>

    <div id="timer-overlay" class="fixed inset-0 bg-slate-950/98 z-[200] hidden flex items-center justify-center p-10 backdrop-blur-md">
        <div class="glass-card p-10 w-full text-center space-y-6 border-emerald-500/30">
            <div id="timer-text" class="text-5xl font-black text-emerald-500">30</div>
            <p class="text-sm font-bold text-white uppercase tracking-widest animate-pulse">Verifying Website Visit...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, updateDoc, setDoc, increment, addDoc, collection, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpH_zn1KQPcIsPojC02UzXLdc017e-Unw",
            authDomain: "bdincomezone-767b4.firebaseapp.com",
            projectId: "bdincomezone-767b4",
            storageBucket: "bdincomezone-767b4.firebasestorage.app",
            messagingSenderId: "1026541741286",
            appId: "1:1026541741286:web:735f4f134ab159b5d28727"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;
        let userData = null, config = {};

        async function init() {
            lucide.createIcons();
            const user = tg.initDataUnsafe?.user;
            if(!user) return;
            const uid = user.id.toString();

            onSnapshot(doc(db, "config", "main"), (snap) => { config = snap.data() || {}; if(userData) renderTasks(); });

            onSnapshot(doc(db, "users", uid), async (snap) => {
                if(snap.exists()) { userData = snap.data(); } 
                else {
                    userData = { uid, name: user.first_name, balance: 50, totalRefer: 0, task1LastDone: null, task2LastDone: null, task3LastDone: null };
                    await setDoc(doc(db, "users", uid), userData);
                    const sp = tg.initDataUnsafe?.start_param;
                    if(sp && sp !== uid) await updateDoc(doc(db, "users", sp), { balance: increment(100), totalRefer: increment(1) });
                }
                updateUI(); renderTasks();
            });
        }

        function updateUI() {
            document.getElementById('tk-balance').innerText = userData.balance.toFixed(2);
            document.getElementById('header-balance').innerText = "৳ " + userData.balance.toFixed(2);
            document.getElementById('user-name').innerText = userData.name;
            document.getElementById('total-ref').innerText = "Refers: " + (userData.totalRefer || 0);
            document.getElementById('refer-link-text').innerText = `https://t.me/bdfreeincometkBot/app?startapp=${userData.uid}`;
        }

        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            const now = Date.now();
            const lockTime = 20 * 60 * 60 * 1000; // 20 Hours

            for(let i=1; i<=3; i++) {
                const lastDone = userData[`task${i}LastDone`]?.toMillis() || 0;
                const diff = now - lastDone;
                const isLocked = lastDone > 0 && diff < lockTime;

                if(isLocked) {
                    const remaining = lockTime - diff;
                    const h = Math.floor(remaining / 3600000);
                    const m = Math.floor((remaining % 3600000) / 60000);
                    list.innerHTML += `
                    <div class="glass-card p-5 flex justify-between items-center opacity-60">
                        <div class="flex items-center gap-3">
                            <i data-lucide="clock" class="text-slate-500 w-5 h-5"></i>
                            <div>
                                <p class="text-sm font-bold text-slate-400">Task 0${i} Locked</p>
                                <p class="text-[10px] text-emerald-500 font-black tracking-widest">${h}h ${m}m Left</p>
                            </div>
                        </div>
                        <button class="px-5 py-2 bg-slate-800 rounded-xl text-[10px] font-black text-slate-500 cursor-not-allowed">LOCKED</button>
                    </div>`;
                } else {
                    list.innerHTML += `
                    <div class="glass-card p-5 flex justify-between items-center border-l-4 border-emerald-500">
                        <div class="flex items-center gap-3">
                            <i data-lucide="globe" class="text-emerald-500 w-5 h-5"></i>
                            <div>
                                <p class="text-sm font-bold text-white">Enterprise Task 0${i}</p>
                                <p class="text-[10px] text-emerald-400 font-black">REWARD: ৳ 50.00</p>
                            </div>
                        </div>
                        <button onclick="startTask(${i}, '${config['linkWeb'+i]}')" class="px-6 py-2.5 bg-emerald-600 rounded-xl text-[10px] font-black hover:bg-emerald-500 transition-all active:scale-95 shadow-lg shadow-emerald-600/20">START</button>
                    </div>`;
                }
            }
            lucide.createIcons();
        }

        window.startTask = (id, url) => {
            if(!url) return;
            tg.openLink(url);
            const overlay = document.getElementById('timer-overlay');
            const timerTxt = document.getElementById('timer-text');
            overlay.classList.remove('hidden');
            let count = 30;
            const itv = setInterval(async () => {
                count--; timerTxt.innerText = count;
                if(count <= 0) {
                    clearInterval(itv); overlay.classList.add('hidden');
                    if(confirm("Task Complete! Claim Reward?")) {
                        const updateData = { balance: increment(50) };
                        updateData[`task${id}LastDone`] = serverTimestamp();
                        await updateDoc(doc(db, "users", userData.uid), updateData);
                        tg.HapticFeedback.notificationOccurred('success');
                    }
                }
            }, 1000);
        };

        window.navigateTo = (id, btn) => {
            document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.add('text-slate-500'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('nav-active'));
            btn.classList.remove('text-slate-500'); btn.classList.add('nav-active');
            tg.HapticFeedback.impactOccurred('light');
        };

        window.copyRefer = () => {
            navigator.clipboard.writeText(document.getElementById('refer-link-text').innerText);
            alert("Link Copied!");
        };

        window.contactAdmin = () => { if(config.linkAdmin) tg.openTelegramLink("https://t.me/" + config.linkAdmin); };

        document.getElementById('withdraw-btn').onclick = async () => {
            const amt = parseFloat(document.getElementById('withdraw-amount').value);
            const num = document.getElementById('payment-number').value;
            if(userData.totalRefer < 15) return alert("15 Refer Required!");
            if(amt < 500 || amt > userData.balance) return alert("Invalid Amount!");
            await updateDoc(doc(db, "users", userData.uid), { balance: increment(-amt) });
            await addDoc(collection(db, "withdrawals"), { uid: userData.uid, name: userData.name, amount: amt, method: document.getElementById('withdraw-method').value, number: num, status: "Pending", time: serverTimestamp() });
            alert("Withdrawal Requested!");
        };

        init();
    </script>
</body>
</html>
