<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK INCOME - Elite Protocol</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background: #020617;
            background-image: radial-gradient(circle at 50% -20%, #1e293b, #020617);
            color: #f8fafc; 
            min-height: 100vh;
        }

        .neo-glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 1.5rem;
        }

        .withdraw-card {
            background: linear-gradient(145deg, rgba(16, 185, 129, 0.15), rgba(30, 41, 59, 0.4));
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 2rem;
        }

        .sub-page { display: none; }
        .sub-page.active { display: block; animation: slideUp 0.4s ease-out; }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .nav-active { color: #10b981 !important; transform: translateY(-5px); transition: all 0.3s ease; }
        
        .status-pill { padding: 4px 10px; border-radius: 8px; font-size: 8px; text-transform: uppercase; font-weight: 800; border: 1px solid transparent; }
        .status-Pending { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border-color: rgba(245, 158, 11, 0.2); }
        .status-Success { background: rgba(16, 185, 129, 0.1); color: #10b981; border-color: rgba(16, 185, 129, 0.2); }
        .status-Rejected { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body class="pb-28">

    <header class="p-5 flex justify-between items-center sticky top-0 z-50 bg-[#020617]/90 backdrop-blur-md border-b border-white/5">
        <div>
            <h1 style="font-family: 'Syncopate', sans-serif;" class="text-sm tracking-widest text-white">TK <span class="text-emerald-500">INCOME</span></h1>
            <div class="flex items-center gap-1">
                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="text-[8px] font-bold text-emerald-500/60 uppercase italic">Protocol Secure</span>
            </div>
        </div>
        <div class="neo-glass px-4 py-1.5 flex items-center gap-2 border-emerald-500/20">
            <i data-lucide="wallet" class="w-3.5 h-3.5 text-emerald-400"></i>
            <span id="top-bal" class="text-xs font-black text-emerald-400 italic">৳ 0.00</span>
        </div>
    </header>

    <main class="p-5 max-w-md mx-auto">
        
        <div id="home-page" class="sub-page active space-y-6">
            <div class="neo-glass p-8 text-center relative overflow-hidden">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] mb-2">Available Balance</p>
                <h2 class="text-5xl font-black italic tracking-tighter text-white">৳ <span id="home-bal">0.00</span></h2>
            </div>
            <div id="main-tasks" class="space-y-3"></div>
        </div>

        <div id="wallet-page" class="sub-page space-y-6">
            <div class="withdraw-card p-6 space-y-5">
                <h3 class="text-xs font-black uppercase text-white tracking-widest">Withdrawal Request</h3>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <select id="gateway" class="w-full bg-black/40 border border-white/10 p-3 rounded-xl text-white text-xs outline-none">
                            <option value="Bkash">Bkash</option>
                            <option value="Nagad">Nagad</option>
                        </select>
                        <input id="amt" type="number" placeholder="Amount" class="w-full bg-black/40 border border-white/10 p-3 rounded-xl text-white text-xs outline-none">
                    </div>
                    <input id="num" type="number" placeholder="Receiver Number" class="w-full bg-black/40 border border-white/10 p-3 rounded-xl text-white text-xs outline-none">
                    <button id="withdraw-btn" onclick="submitWithdraw()" class="w-full py-4 bg-emerald-500 text-black font-black rounded-2xl text-xs uppercase tracking-widest active:scale-95 transition-all">Submit Request</button>
                </div>
            </div>

            <div class="space-y-3">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Transaction Log</h3>
                <div id="txn-history" class="space-y-2">
                    <div class="text-center p-5 text-[10px] text-slate-500 uppercase italic">Loading history...</div>
                </div>
            </div>
        </div>

        <div id="refer-page" class="sub-page space-y-6">
            <div class="neo-glass p-8 text-center bg-emerald-500/5">
                <i data-lucide="users" class="w-10 h-10 text-emerald-500 mx-auto mb-3"></i>
                <h2 class="text-xl font-bold italic uppercase">Affiliate Link</h2>
                <p id="ref-link" class="bg-black/30 p-4 mt-4 rounded-xl border border-white/5 break-all text-[10px] text-emerald-400 font-mono">Loading...</p>
                <button onclick="copyLink()" class="w-full mt-4 py-4 bg-emerald-500 text-black font-black rounded-xl text-[11px] uppercase active:scale-95 transition-all">Copy My Link</button>
            </div>
        </div>

        <div id="profile-page" class="sub-page space-y-6">
            <div class="neo-glass p-8 text-center">
                <h2 id="u-name" class="text-xl font-black italic text-white uppercase tracking-tight">Agent</h2>
                <p id="u-id" class="text-[9px] text-slate-500 font-mono">UID-000000</p>
                <div class="mt-6 flex justify-center gap-10">
                    <div><p class="text-[8px] font-bold text-slate-500 uppercase">Invites</p><p id="p-ref" class="text-xl font-black text-emerald-400">0</p></div>
                    <div><p class="text-[8px] font-bold text-slate-500 uppercase">Rank</p><p class="text-xs font-black text-white italic">ELITE</p></div>
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-6 left-6 right-6 neo-glass p-2 flex justify-around items-center z-[100] bg-slate-900/80 border-white/10">
        <button onclick="changePage('home-page', this)" class="nav-btn nav-active p-3"><i data-lucide="layout-grid" class="w-5 h-5"></i></button>
        <button onclick="changePage('refer-page', this)" class="nav-btn text-slate-500 p-3"><i data-lucide="user-plus" class="w-5 h-5"></i></button>
        <button onclick="changePage('wallet-page', this)" class="nav-btn text-slate-500 p-3"><i data-lucide="history" class="w-5 h-5"></i></button>
        <button onclick="changePage('profile-page', this)" class="nav-btn text-slate-500 p-3"><i data-lucide="settings" class="w-5 h-5"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, getDoc, onSnapshot, setDoc, updateDoc, increment, collection, addDoc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDpH_zn1KQPcIsPojC02UzXLdc017e-Unw", projectId: "bdincomezone-767b4" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;

        let userData = null;
        let config = {};
        const uid = tg.initDataUnsafe?.user?.id?.toString() || "dev_user";
        const BOT_USERNAME = "bdfreeincometkBot"; 

        async function init() {
            lucide.createIcons();
            tg.expand();
            
            document.getElementById('ref-link').innerText = `https://t.me/${BOT_USERNAME}/app?startapp=${uid}`;

            const userRef = doc(db, "users", uid);
            const userSnap = await getDoc(userRef);

            if (!userSnap.exists()) {
                const refBy = tg.initDataUnsafe?.start_param || null;
                await setDoc(userRef, { uid, name: tg.initDataUnsafe?.user?.first_name || "Agent", balance: 50.0, totalRefer: 0, joinedAt: serverTimestamp() });
                if(refBy && refBy !== uid) {
                    const rRef = doc(db, "users", refBy);
                    await updateDoc(rRef, { balance: increment(70), totalRefer: increment(1) });
                }
            }

            onSnapshot(doc(db, "config", "main"), (s) => { 
                config = s.data() || {}; 
                renderTasks(); 
            });

            onSnapshot(userRef, (s) => { 
                userData = s.data(); 
                updateUI(); 
                renderTasks();
            });

            loadHistory();
        }

        function updateUI() {
            if(!userData) return;
            const b = userData.balance.toFixed(2);
            document.getElementById('home-bal').innerText = b;
            document.getElementById('top-bal').innerText = "৳ " + b;
            document.getElementById('p-ref').innerText = userData.totalRefer;
            document.getElementById('u-name').innerText = userData.name;
            document.getElementById('u-id').innerText = "UID-" + uid;
        }

        window.submitWithdraw = async () => {
            const amt = parseFloat(document.getElementById('amt').value);
            const num = document.getElementById('num').value;
            const method = document.getElementById('gateway').value;
            const btn = document.getElementById('withdraw-btn');
            
            if(userData.totalRefer < 15) return alert("Error: 15 active referrals required.");
            if(isNaN(amt) || amt < 500) return alert("Min withdrawal ৳ 500");
            if(amt > userData.balance) return alert("Insufficient funds!");
            if(num.length < 10) return alert("Enter valid number");
            
            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                // ১. ব্যালেন্স আপডেট
                await updateDoc(doc(db, "users", uid), { balance: increment(-amt) });
                
                // ২. উইথড্র ডাটা সেভ
                await addDoc(collection(db, "withdrawals"), { 
                    uid, 
                    amount: amt, 
                    number: num, 
                    method, 
                    status: "Pending", 
                    time: serverTimestamp() 
                });
                
                alert("Withdrawal Requested Successfully!");
                document.getElementById('amt').value = ''; 
                document.getElementById('num').value = '';
                tg.HapticFeedback.notificationOccurred('success');
            } catch (e) {
                alert("Submission error! Check internet.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Submit Request";
            }
        }

        function loadHistory() {
            // ইনডেক্স এরর এড়াতে প্রথমে শুধু UID দিয়ে ফিল্টার করছি
            const q = query(collection(db, "withdrawals"), where("uid", "==", uid));
            
            onSnapshot(q, (sn) => {
                const box = document.getElementById('txn-history');
                if (sn.empty) {
                    box.innerHTML = '<div class="neo-glass p-8 text-center text-[10px] text-slate-600 uppercase italic">No history found</div>';
                    return;
                }

                // জাভাস্ক্রিপ্ট দিয়ে সর্ট করছি যাতে ইনডেক্স না থাকলেও কাজ করে
                let logs = [];
                sn.forEach(d => logs.push(d.data()));
                logs.sort((a, b) => (b.time?.toMillis() || 0) - (a.time?.toMillis() || 0));

                box.innerHTML = '';
                logs.forEach(w => {
                    const statusClass = `status-${w.status || 'Pending'}`;
                    box.innerHTML += `
                    <div class="neo-glass p-4 flex justify-between items-center border-l-2 ${w.status === 'Pending' ? 'border-amber-500' : 'border-emerald-500'}">
                        <div>
                            <p class="text-[10px] font-black text-white uppercase">${w.method}</p>
                            <p class="text-[8px] text-slate-500 font-mono">${w.number}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[11px] font-black text-emerald-400 italic">৳ ${w.amount}</p>
                            <span class="status-pill ${statusClass}">${w.status || 'Pending'}</span>
                        </div>
                    </div>`;
                });
                lucide.createIcons();
            }, (error) => {
                console.error("History Error: ", error);
                document.getElementById('txn-history').innerHTML = '<div class="text-center p-5 text-red-400 text-[10px]">Failed to load history.</div>';
            });
        }

        // --- Task System ---
        function renderTasks() {
            const mBox = document.getElementById('main-tasks');
            if(!mBox || !config) return;
            mBox.innerHTML = '';
            const now = Date.now();
            for(let i=1; i<=5; i++){
                const link = config[`linkWeb${i}`];
                if(!link) continue;
                const last = userData[`task${i}Last`]?.toMillis() || 0;
                const isLocked = (now - last < 20 * 3600000);
                mBox.innerHTML += `
                <div class="neo-glass p-4 flex justify-between items-center ${isLocked ? 'opacity-40' : 'border-l-2 border-emerald-500'}">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-emerald-500/5 flex items-center justify-center border border-white/5"><span class="text-[10px] font-black text-emerald-500">${i}</span></div>
                        <div><p class="text-[9px] font-black uppercase text-slate-400">Node ${i}</p><p class="text-[10px] text-white font-bold">REWARD ৳ 25.00</p></div>
                    </div>
                    <button id="task-btn-${i}" ${isLocked ? 'disabled' : `onclick="handleTask(${i}, '${link}')"`} class="px-4 py-2 rounded-lg ${isLocked ? 'bg-white/5 text-slate-600' : 'bg-emerald-500/10 text-emerald-400'} text-[9px] font-black uppercase">${isLocked ? 'Locked' : 'Start'}</button>
                </div>`;
            }
        }

        window.handleTask = (id, link) => {
            const btn = document.getElementById(`task-btn-${id}`);
            tg.openLink(link);
            let timeLeft = 30;
            btn.disabled = true;
            const timer = setInterval(() => {
                btn.innerText = `${timeLeft}s`;
                timeLeft--;
                if (timeLeft < 0) {
                    clearInterval(timer);
                    btn.innerText = "Verify";
                    btn.classList.add('bg-emerald-500', 'text-black');
                    btn.disabled = false;
                    btn.onclick = () => collectReward(id);
                }
            }, 1000);
        };

        window.collectReward = async (id) => {
            await updateDoc(doc(db, "users", uid), { balance: increment(25), [`task${id}Last`]: serverTimestamp() });
            tg.HapticFeedback.notificationOccurred('success');
        };

        window.changePage = (id, btn) => {
            document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('nav-active', 'text-emerald-500'));
            btn.classList.add('nav-active');
            lucide.createIcons();
        }

        window.copyLink = () => { 
            navigator.clipboard.writeText(document.getElementById('ref-link').innerText); 
            alert("Copied!"); 
        }

        init();
    </script>
</body>
</html>
