<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Income - Midnight Onyx</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src='//libtl.com/sdk.js' data-zone='10844896' data-sdk='show_10844896'></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Hind+Siliguri:wght@400;700&family=Space+Grotesk:wght@700&display=swap');
        
        :root {
            --primary: #6366f1;
            --accent: #f59e0b;
            --bg-deep: #020205;
        }

        body { 
            font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; 
            background: var(--bg-deep);
            color: #ffffff;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.1), transparent 30%),
                radial-gradient(circle at 90% 90%, rgba(245, 158, 11, 0.05), transparent 30%);
        }

        /* Onyx Glass Effect */
        .onyx-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        /* Liquid Sphere for Balance */
        .liquid-sphere {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto;
            background: linear-gradient(45deg, var(--primary), #a855f7);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            animation: liquid 8s ease-in-out infinite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px rgba(99, 102, 241, 0.3);
        }

        @keyframes liquid {
            0%, 100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            50% { border-radius: 60% 40% 30% 70% / 50% 60% 40% 60%; }
        }

        /* Holographic Task Card */
        .holo-task {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.4s;
        }
        .holo-task:active { transform: scale(0.96); }
        .holo-task::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(transparent, rgba(255,255,255,0.03), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }

        /* Floating Nav */
        .floating-nav {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(15, 15, 20, 0.9);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3rem;
            padding: 0.8rem;
            display: flex;
            justify-content: space-around;
            z-index: 1000;
        }

        .nav-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            transition: 0.3s;
        }
        .nav-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        .btn-premium {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            color: white;
            font-weight: 800;
            border-radius: 1.2rem;
            padding: 1rem 2rem;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .sub-page { display: none; }
        .sub-page.active { display: block; animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-40">

    <header class="p-8 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 onyx-card flex items-center justify-center">
                <i data-lucide="layout-grid" class="w-6 h-6 text-indigo-400"></i>
            </div>
            <div>
                <h1 style="font-family: 'Space Grotesk';" class="text-sm font-black tracking-widest text-white uppercase">ONLINE <span class="text-indigo-500">INCOME</span></h1>
                <p class="text-[8px] text-slate-500 font-bold uppercase tracking-[0.3em]">Onyx Protocol v6.0</p>
            </div>
        </div>
        <div class="onyx-card px-5 py-2 flex items-center gap-3">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
            <span class="text-xs font-black text-white">৳<span id="top-bal">0.00</span></span>
        </div>
    </header>

    <main class="px-7 max-w-md mx-auto space-y-12">
        
        <div id="home-page" class="sub-page active space-y-12">
            <div class="py-10 text-center">
                <div class="liquid-sphere">
                    <p class="text-[10px] font-bold text-white/60 uppercase tracking-widest">ব্যালেন্স</p>
                    <h2 class="text-4xl font-black text-white italic">৳<span id="home-bal">0.00</span></h2>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-5">
                <a href="#" id="official-group-link" class="onyx-card p-6 text-center group">
                    <i data-lucide="messages-square" class="w-6 h-6 mx-auto mb-3 text-indigo-400 group-hover:scale-110 transition"></i>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">কমিউনিটি</span>
                </a>
                <a href="#" id="payment-channel-link" class="onyx-card p-6 text-center group">
                    <i data-lucide="shield-check" class="w-6 h-6 mx-auto mb-3 text-amber-500 group-hover:scale-110 transition"></i>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">পেমেন্ট লিস্ট</span>
                </a>
            </div>

            <div class="space-y-6">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em] px-2 flex items-center gap-3">
                    <span class="w-10 h-[1px] bg-indigo-500/30"></span> অ্যাড স্লট
                </h3>
                <div class="grid grid-cols-2 gap-5">
                    <div onclick="showAdSlot(1)" class="onyx-card p-8 text-center active:scale-95 transition border-indigo-500/10">
                        <div class="w-12 h-12 bg-indigo-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-indigo-500/20">
                            <i data-lucide="zap" class="w-6 h-6 text-indigo-400"></i>
                        </div>
                        <p class="text-[10px] font-bold text-white mb-1">স্লট ১</p>
                        <p class="text-xs font-black text-indigo-500">+৳৫.০০</p>
                    </div>
                    <div onclick="showAdSlot(2)" class="onyx-card p-8 text-center active:scale-95 transition border-amber-500/10">
                        <div class="w-12 h-12 bg-amber-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-amber-500/20">
                            <i data-lucide="video" class="w-6 h-6 text-amber-500"></i>
                        </div>
                        <p class="text-[10px] font-bold text-white mb-1">স্লট ২</p>
                        <p class="text-xs font-black text-amber-500">+৳৫.০০</p>
                    </div>
                </div>
            </div>

            <div class="space-y-5">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em] px-2 flex items-center gap-3">
                    <span class="w-10 h-[1px] bg-indigo-500/30"></span> স্পেশাল মিশন
                </h3>
                <div id="main-tasks" class="space-y-4"></div>
            </div>
        </div>

        <div id="wallet-page" class="sub-page space-y-8">
            <div class="onyx-card p-10 space-y-8">
                <div class="text-center">
                    <h3 class="text-sm font-black text-white uppercase tracking-widest">উত্তোলন করুন</h3>
                </div>
                <div class="space-y-4">
                    <select id="gateway" class="w-full bg-white/5 p-5 rounded-2xl text-xs text-white border border-white/5 outline-none focus:border-indigo-500">
                        <option value="Bkash">বিকাশ (Bkash)</option>
                        <option value="Nagad">নগদ (Nagad)</option>
                    </select>
                    <input id="amt" type="number" placeholder="পরিমাণ (মিনিমাম ৫০০)" class="w-full bg-white/5 p-5 rounded-2xl text-xs text-white border border-white/5 outline-none focus:border-indigo-500">
                    <input id="num" type="number" placeholder="মোবাইল নম্বর" class="w-full bg-white/5 p-5 rounded-2xl text-xs text-white border border-white/5 outline-none focus:border-indigo-500">
                    <button onclick="submitWithdraw()" class="w-full btn-premium">রিকোয়েস্ট পাঠান</button>
                </div>
            </div>
            <div id="txn-history" class="space-y-3"></div>
        </div>

        <div id="refer-page" class="sub-page space-y-8">
            <div class="onyx-card p-12 text-center bg-gradient-to-b from-indigo-500/10 to-transparent">
                <i data-lucide="user-plus" class="w-12 h-12 text-indigo-400 mx-auto mb-5"></i>
                <h2 style="font-family: 'Space Grotesk';" class="text-xl font-bold uppercase tracking-widest">রেফারেল সিস্টেম</h2>
                <p class="text-[10px] text-slate-400 mt-2 uppercase tracking-[0.2em]">প্রতিটি সফল রেফারে পাবেন <span class="text-indigo-400 font-black">৳৭০.০০</span></p>
            </div>
            <div class="onyx-card p-6 space-y-6">
                <div class="bg-black/40 p-5 rounded-3xl border border-white/5 text-center">
                    <p id="ref-link" class="text-[10px] text-indigo-400 font-mono break-all leading-relaxed">লিঙ্ক জেনারেট হচ্ছে...</p>
                </div>
                <button onclick="copyLink()" class="w-full btn-premium">লিঙ্ক কপি করুন</button>
            </div>
        </div>

        <div id="profile-page" class="sub-page space-y-8">
            <div class="onyx-card p-14 text-center">
                <div class="w-32 h-32 bg-indigo-500/5 rounded-full flex items-center justify-center mx-auto mb-6 border-2 border-indigo-500/20 relative shadow-2xl">
                    <i data-lucide="user-check-2" class="w-14 h-14 text-indigo-500"></i>
                    <div class="absolute bottom-1 right-1 w-8 h-8 bg-indigo-500 rounded-full border-4 border-[#020205] flex items-center justify-center">
                        <i data-lucide="check" class="w-4 h-4 text-white"></i>
                    </div>
                </div>
                <h2 id="u-name" class="text-2xl font-black text-white tracking-tighter uppercase">AGENT STATUS</h2>
                <p id="u-id" class="text-[9px] text-slate-500 font-mono mt-3 uppercase tracking-widest">SECURE ACCESS: 000000</p>
            </div>
        </div>

    </main>

    <nav class="floating-nav">
        <button onclick="changePage('home-page', this)" class="nav-btn active">
            <i data-lucide="house" class="w-6 h-6"></i>
        </button>
        <button onclick="changePage('refer-page', this)" class="nav-btn">
            <i data-lucide="users" class="w-6 h-6"></i>
        </button>
        <button onclick="changePage('wallet-page', this)" class="nav-btn">
            <i data-lucide="wallet" class="w-6 h-6"></i>
        </button>
        <button onclick="changePage('profile-page', this)" class="nav-btn">
            <i data-lucide="circle-user" class="w-6 h-6"></i>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, getDoc, onSnapshot, setDoc, updateDoc, increment, collection, addDoc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDpH_zn1KQPcIsPojC02UzXLdc017e-Unw", projectId: "bdincomezone-767b4" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;

        let userData = null;
        let config = {};
        const uid = tg.initDataUnsafe?.user?.id?.toString() || "dev_user";

        async function init() {
            lucide.createIcons();
            tg.expand();
            tg.headerColor = "#020205";
            tg.backgroundColor = "#020205";
            
            document.getElementById('ref-link').innerText = `https://t.me/bdfreeincometkBot/app?startapp=${uid}`;

            const userRef = doc(db, "users", uid);
            const userSnap = await getDoc(userRef);

            if (!userSnap.exists()) {
                const refBy = tg.initDataUnsafe?.start_param || null;
                await setDoc(userRef, { uid, name: tg.initDataUnsafe?.user?.first_name || "Agent", balance: 0.0, totalRefer: 0, joinedAt: serverTimestamp() });
                if(refBy && refBy !== uid) {
                    const rRef = doc(db, "users", refBy);
                    await updateDoc(rRef, { balance: increment(70), totalRefer: increment(1) });
                }
            }

            onSnapshot(doc(db, "config", "main"), (s) => { 
                config = s.data() || {}; 
                if(config.officialGroup) document.getElementById('official-group-link').href = config.officialGroup;
                if(config.paymentChannel) document.getElementById('payment-channel-link').href = config.paymentChannel;
                renderTasks(); 
            });
            onSnapshot(userRef, (s) => { userData = s.data(); updateUI(); });
            loadHistory();
        }

        function updateUI() {
            if(!userData) return;
            const b = userData.balance.toFixed(2);
            document.getElementById('home-bal').innerText = b;
            document.getElementById('top-bal').innerText = b;
            document.getElementById('u-name').innerText = userData.name.toUpperCase();
            document.getElementById('u-id').innerText = "NODE: " + uid;
        }

        window.showAdSlot = (id) => {
            if (typeof show_10844896 === 'function') {
                show_10844896().then(async () => {
                    await updateDoc(doc(db, "users", uid), { balance: increment(5) });
                    tg.HapticFeedback.notificationOccurred('success');
                    tg.showAlert("অভিনন্দন! ৫ টাকা ক্রেডিট করা হয়েছে।");
                });
            } else { tg.showAlert("Ad engine initializing..."); }
        };

        function renderTasks() {
            const mBox = document.getElementById('main-tasks');
            if(!mBox) return;
            mBox.innerHTML = '';
            for(let i=1; i<=5; i++){
                const link = config[`linkWeb${i}`];
                if(!link) continue;
                mBox.innerHTML += `
                <div class="holo-task flex justify-between items-center group">
                    <div class="flex items-center gap-5">
                        <div class="w-14 h-14 rounded-3xl bg-indigo-500/10 flex items-center justify-center border border-indigo-500/20 shadow-xl">
                            <i data-lucide="globe" class="w-7 h-7 text-indigo-400"></i>
                        </div>
                        <div>
                            <p class="text-[11px] font-black text-white uppercase tracking-widest">টাস্ক নম্বর - ${i}</p>
                            <p class="text-[10px] text-indigo-400 font-bold">+৳১০.০০ ইনকাম</p>
                        </div>
                    </div>
                    <button id="task-btn-${i}" onclick="handleTask(${i}, '${link}')" class="px-7 py-3.5 btn-premium text-[10px]">রান করুন</button>
                </div>`;
            }
            lucide.createIcons();
        }

        window.handleTask = (id, link) => {
            const btn = document.getElementById(`task-btn-${id}`);
            tg.openLink(link);
            let timeLeft = 25;
            btn.disabled = true;
            const timer = setInterval(() => {
                btn.innerText = timeLeft;
                timeLeft--;
                if (timeLeft < 0) {
                    clearInterval(timer);
                    btn.innerText = "ক্লেম করুন";
                    btn.disabled = false;
                    btn.onclick = async () => {
                        await updateDoc(doc(db, "users", uid), { balance: increment(10) });
                        tg.showAlert("সাফল্য! ১০ টাকা যোগ হয়েছে।");
                        renderTasks();
                    }
                }
            }, 1000);
        };

        window.submitWithdraw = async () => {
            const amt = parseFloat(document.getElementById('amt').value);
            const num = document.getElementById('num').value;
            if(amt < 500) return tg.showAlert("মিনিমাম উত্তোলন ৫০০ টাকা।");
            if(amt > userData.balance) return tg.showAlert("ব্যালেন্স পর্যাপ্ত নয়।");
            await updateDoc(doc(db, "users", uid), { balance: increment(-amt) });
            await addDoc(collection(db, "withdrawals"), { uid, amount: amt, number: num, method: document.getElementById('gateway').value, status: "Pending", time: serverTimestamp() });
            tg.showAlert("রিকোয়েস্ট গ্রহণ করা হয়েছে!");
        };

        window.changePage = (id, btn) => {
            document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
            lucide.createIcons();
            tg.HapticFeedback.impactOccurred('medium');
        }

        window.copyLink = () => { navigator.clipboard.writeText(document.getElementById('ref-link').innerText); tg.showAlert("লিঙ্ক কপি হয়েছে!"); }

        function loadHistory() {
            const q = query(collection(db, "withdrawals"), where("uid", "==", uid), orderBy("time", "desc"));
            onSnapshot(q, (sn) => {
                const box = document.getElementById('txn-history');
                box.innerHTML = '';
                sn.forEach(d => {
                    const w = d.data();
                    box.innerHTML += `<div class="onyx-card p-5 flex justify-between items-center mb-3">
                        <div class="flex items-center gap-4">
                            <i data-lucide="history" class="w-5 h-5 text-slate-500"></i>
                            <div>
                                <p class="text-[10px] font-bold text-white uppercase">${w.method}</p>
                                <p class="text-[9px] text-slate-500 uppercase">${w.status}</p>
                            </div>
                        </div>
                        <p class="text-sm font-black text-white">৳${w.amount}</p>
                    </div>`;
                });
                lucide.createIcons();
            });
        }

        init();
    </script>
</body>
</html>
