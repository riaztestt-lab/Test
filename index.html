<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK INCOME - Premium User Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src='//libtl.com/sdk.js' data-zone='10844896' data-sdk='show_10844896'></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --accent: #10b981;
            --bg: #05070a;
            --card: rgba(17, 24, 39, 0.7);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: #f1f5f9; 
            min-height: 100vh;
        }

        .glass-panel { 
            background: var(--card); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .premium-gradient {
            background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
        }

        .nav-btn.active {
            color: var(--accent);
            background: rgba(16, 185, 129, 0.1);
        }

        .sub-page { display: none; }
        .sub-page.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .method-card { border: 2px solid transparent; cursor: pointer; transition: 0.3s; }
        .method-card.selected { border-color: var(--accent); background: rgba(16, 185, 129, 0.1); }
        
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 flex justify-between items-center sticky top-0 z-50 bg-[#05070a]/80 backdrop-blur-md">
        <div class="flex items-center gap-2">
            <div class="p-2 bg-emerald-500/10 rounded-lg border border-emerald-500/20">
                <i data-lucide="zap" class="w-5 h-5 text-emerald-500"></i>
            </div>
            <h1 class="font-black text-xl tracking-tighter italic">TK <span class="text-emerald-500">INCOME</span></h1>
        </div>
        <div class="glass-panel px-4 py-2 rounded-xl border-emerald-500/20">
            <p id="header-balance" class="text-emerald-400 font-black tracking-tighter">৳ 0.00</p>
        </div>
    </header>

    <main class="p-5 max-w-md mx-auto">
        
        <div id="home-page" class="sub-page active space-y-6">
            <div class="glass-panel p-8 rounded-[2.5rem] text-center border-emerald-500/10 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500/5 blur-3xl rounded-full"></div>
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Available Balance</p>
                <h2 class="text-5xl font-black text-white tracking-tighter">৳ <span id="main-balance">0.00</span></h2>
                <div class="flex gap-3 mt-8">
                    <button onclick="showPage('wallet-page')" class="flex-1 premium-gradient py-4 rounded-2xl font-black text-xs uppercase shadow-lg shadow-emerald-500/20">Withdraw</button>
                    <button onclick="showPage('refer-page')" class="flex-1 bg-white/5 py-4 rounded-2xl font-black text-xs uppercase border border-white/5">Referral</button>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest px-2 italic">Daily Missions (20H)</h3>
                <div id="task-list-main" class="space-y-3"></div>
                
                <h3 class="text-[10px] font-black text-blue-500 uppercase tracking-widest px-2 italic pt-4">Bonus Ads (30M)</h3>
                <div id="task-list-bonus" class="space-y-3"></div>
            </div>
        </div>

        <div id="refer-page" class="sub-page space-y-6">
            <div class="glass-panel p-8 rounded-[2.5rem] text-center">
                <div class="w-20 h-20 bg-emerald-500/10 rounded-3xl mx-auto flex items-center justify-center border border-emerald-500/20 mb-6">
                    <i data-lucide="users" class="w-10 h-10 text-emerald-500"></i>
                </div>
                <h2 class="text-3xl font-black text-white tracking-tight">Invite & Earn ৳70</h2>
                <p class="text-slate-400 text-sm mt-2 font-medium">Earn ৳70 for every successful referral!</p>
            </div>
            
            <div class="glass-panel p-6 rounded-[2rem]">
                <div class="flex justify-between items-end mb-4">
                    <p class="text-2xl font-black text-white"><span id="total-refer" class="text-emerald-500">0</span> / 15</p>
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Referral Goal</p>
                </div>
                <div class="w-full bg-black/40 h-3 rounded-full overflow-hidden border border-white/5">
                    <div id="refer-progress" class="h-full premium-gradient transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>

            <div class="glass-panel p-6 rounded-[2rem] space-y-4">
                <div class="bg-black/50 p-5 rounded-2xl border border-white/5 break-all text-center">
                    <p id="refer-link" class="text-xs font-bold text-emerald-400 tracking-tight italic">Generating link...</p>
                </div>
                <button onclick="copyReferLink()" class="w-full premium-gradient py-5 rounded-2xl font-black text-sm uppercase shadow-xl">Copy Referral Link</button>
            </div>
        </div>

        <div id="wallet-page" class="sub-page space-y-6">
            <div class="glass-panel p-6 rounded-[2.5rem]">
                <h3 class="text-lg font-black text-white mb-6 flex items-center gap-2 italic">
                    <i data-lucide="landmark" class="text-emerald-500"></i> Withdrawal Method
                </h3>
                
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div onclick="selectMethod('Bkash')" id="method-Bkash" class="method-card glass-panel p-5 rounded-3xl flex flex-col items-center gap-3">
                        <img src="https://raw.githubusercontent.com/tuhin-f-official/tk-income-assets/main/bkash.png" class="w-12 h-12 rounded-2xl shadow-lg" onerror="this.src='https://i.ibb.co/5G6mS7X/bkash.png'">
                        <p class="text-[10px] font-black text-white uppercase tracking-widest">bKash</p>
                    </div>
                    <div onclick="selectMethod('Nagad')" id="method-Nagad" class="method-card glass-panel p-5 rounded-3xl flex flex-col items-center gap-3">
                        <img src="https://raw.githubusercontent.com/tuhin-f-official/tk-income-assets/main/nagad.png" class="w-12 h-12 rounded-2xl shadow-lg" onerror="this.src='https://i.ibb.co/M9fMv8v/nagad.png'">
                        <p class="text-[10px] font-black text-white uppercase tracking-widest">Nagad</p>
                    </div>
                </div>

                <div class="space-y-4">
                    <input id="amount-input" type="number" placeholder="৳ Amount (Min 500)" class="w-full bg-black/40 border border-white/5 p-5 rounded-2xl text-white font-bold outline-none focus:border-emerald-500/50">
                    <input id="number-input" type="number" placeholder="Wallet Number" class="w-full bg-black/40 border border-white/5 p-5 rounded-2xl text-white font-bold outline-none focus:border-emerald-500/50">
                    <button id="withdraw-btn" class="w-full premium-gradient py-5 rounded-2xl font-black text-sm uppercase shadow-xl mt-2">Submit Request</button>
                </div>
            </div>

            <div id="payout-history" class="space-y-3">
                </div>
        </div>

    </main>

    <nav class="fixed bottom-6 left-6 right-6 glass-panel p-3 rounded-[2rem] flex justify-between items-center z-[100] border-white/10 shadow-2xl">
        <button onclick="showPage('home-page', this)" class="nav-btn active flex-1 py-3 rounded-2xl flex justify-center transition-all">
            <i data-lucide="home"></i>
        </button>
        <button onclick="showPage('refer-page', this)" class="nav-btn flex-1 py-3 rounded-2xl flex justify-center transition-all text-slate-500">
            <i data-lucide="share-2"></i>
        </button>
        <button onclick="showPage('wallet-page', this)" class="nav-btn flex-1 py-3 rounded-2xl flex justify-center transition-all text-slate-500">
            <i data-lucide="history"></i>
        </button>
    </nav>

    <div id="timer-overlay" class="fixed inset-0 bg-[#05070a]/98 z-[9999] hidden flex items-center justify-center">
        <div class="text-center">
            <div class="w-32 h-32 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin mx-auto mb-8 relative">
                <span id="timer-count" class="absolute inset-0 flex items-center justify-center text-4xl font-black text-white">15</span>
            </div>
            <h2 class="text-xl font-black text-white uppercase tracking-tighter">Mission in Progress</h2>
            <p class="text-slate-500 text-sm mt-2 font-bold italic">Do not close this page!</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, increment, addDoc, collection, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDpH_zn1KQPcIsPojC02UzXLdc017e-Unw", 
            projectId: "bdincomezone-767b4" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;
        let userData = null;
        let config = {};
        let selectedMethod = "Bkash";

        async function init() {
            lucide.createIcons();
            tg.expand();
            const user = tg.initDataUnsafe?.user;
            if(!user) return;
            const uid = user.id.toString();

            // Config Listener
            onSnapshot(doc(db, "config", "main"), (snap) => {
                config = snap.data() || {};
                if(userData) renderTasks();
            });

            // User Profile Listener
            onSnapshot(doc(db, "users", uid), async (snap) => {
                if(snap.exists()) {
                    userData = snap.data();
                } else {
                    userData = { uid, name: user.first_name, balance: 25, totalRefer: 0 };
                    await setDoc(doc(db, "users", uid), userData);
                    // Handle Referral Bonus
                    const startParam = tg.initDataUnsafe?.start_param;
                    if(startParam && startParam !== uid) {
                        await updateDoc(doc(db, "users", startParam), { 
                            balance: increment(70), 
                            totalRefer: increment(1) 
                        });
                    }
                }
                updateUI();
                renderTasks();
                loadHistory(uid);
            });
        }

        function updateUI() {
            const bal = (userData.balance || 0).toFixed(2);
            document.getElementById('main-balance').innerText = bal;
            document.getElementById('header-balance').innerText = "৳ " + bal;
            document.getElementById('total-refer').innerText = userData.totalRefer || 0;
            
            const progress = Math.min(100, ((userData.totalRefer || 0) / 15) * 100);
            document.getElementById('refer-progress').style.width = progress + '%';
            
            // Fixed Refer Link Generation
            document.getElementById('refer-link').innerText = `https://t.me/bdfreeincometkBot/app?startapp=${userData.uid}`;
            selectMethod('Bkash');
        }

        function renderTasks() {
            const mainList = document.getElementById('task-list-main');
            const bonusList = document.getElementById('task-list-bonus');
            mainList.innerHTML = bonusList.innerHTML = '';
            const now = Date.now();

            // Daily Tasks 1-3
            for(let i=1; i<=3; i++) {
                const last = userData[`task${i}LastDone`]?.toMillis() || 0;
                const isLocked = (now - last < 20 * 3600000);
                
                mainList.innerHTML += `
                    <div class="glass-panel p-4 rounded-2xl flex justify-between items-center ${isLocked ? 'opacity-40' : ''}">
                        <div class="flex items-center gap-3">
                            <div class="p-2 bg-emerald-500/10 rounded-xl text-emerald-500"><i data-lucide="layout"></i></div>
                            <div><p class="text-xs font-black text-white uppercase tracking-tighter">Mission 0${i}</p><p class="text-[10px] text-emerald-500 font-bold">Reward: ৳25.00</p></div>
                        </div>
                        ${isLocked ? '<span class="text-[9px] font-black text-slate-500 uppercase">Wait 20H</span>' : 
                        `<button onclick="startTask(${i}, '${config['linkWeb'+i]}', 15)" class="bg-emerald-600 px-5 py-2 rounded-xl text-[10px] font-black text-white">START</button>`}
                    </div>`;
            }

            // Bonus Tasks 4-5
            for(let i=4; i<=5; i++) {
                const last = userData[`task${i}LastDone`]?.toMillis() || 0;
                const count = userData[`task${i}Count`] || 0;
                const isLocked = (count >= 5 && now - last < 30 * 60000);

                bonusList.innerHTML += `
                    <div class="glass-panel p-4 rounded-2xl flex justify-between items-center ${isLocked ? 'opacity-40' : ''}">
                        <div class="flex items-center gap-3">
                            <div class="p-2 bg-blue-500/10 rounded-xl text-blue-500"><i data-lucide="play"></i></div>
                            <div><p class="text-xs font-black text-white uppercase tracking-tighter">Video Ad 0${i-3}</p><p class="text-[10px] text-blue-400 font-bold">Reward: ৳25.00</p></div>
                        </div>
                        ${isLocked ? '<span class="text-[9px] font-black text-slate-500 uppercase">Wait 30M</span>' : 
                        `<button onclick="startTask(${i}, '${config['linkWeb'+i]}', 20)" class="bg-blue-600 px-5 py-2 rounded-xl text-[10px] font-black text-white tracking-widest">WATCH</button>`}
                    </div>`;
            }
            lucide.createIcons();
        }

        window.startTask = (id, url, sec) => {
            if(!url) return alert("Task Link is missing!");
            tg.openLink(url);
            
            const overlay = document.getElementById('timer-overlay');
            const timerTxt = document.getElementById('timer-count');
            overlay.classList.remove('hidden');
            let count = sec;
            timerTxt.innerText = count;

            const interval = setInterval(async () => {
                count--;
                timerTxt.innerText = count;
                if(count <= 0) {
                    clearInterval(interval);
                    overlay.classList.add('hidden');
                    if(confirm("Confirm Reward Claim?")) {
                        const now = Date.now();
                        const last = userData[`task${id}LastDone`]?.toMillis() || 0;
                        let currentCount = (userData[`task${id}Count`] || 0);
                        
                        // Logic for 30m bonus ad limits
                        if(id >= 4) currentCount = (now - last >= 30 * 60000) ? 1 : currentCount + 1;

                        const updateData = { balance: increment(25) };
                        updateData[`task${id}LastDone`] = serverTimestamp();
                        if(id >= 4) updateData[`task${id}Count`] = currentCount;

                        await updateDoc(doc(db, "users", userData.uid), updateData);
                        tg.HapticFeedback.notificationOccurred('success');
                    }
                }
            }, 1000);
        };

        window.loadHistory = (uid) => {
            const q = query(collection(db, "withdrawals"), where("uid", "==", uid));
            onSnapshot(q, (snap) => {
                const container = document.getElementById('payout-history');
                container.innerHTML = '';
                if(snap.empty) {
                    container.innerHTML = '<p class="text-center text-slate-600 text-[10px] font-bold py-6 italic">No recent transactions</p>';
                    return;
                }
                snap.forEach(d => {
                    const w = d.data();
                    container.innerHTML += `
                        <div class="glass-panel p-4 rounded-2xl flex justify-between items-center border-white/5">
                            <div>
                                <p class="text-xs font-black text-white">${w.method} Transfer</p>
                                <p class="text-[9px] font-bold text-slate-500">${w.number}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-black text-white">৳ ${w.amount}</p>
                                <p class="text-[8px] font-black uppercase ${w.status === 'Pending' ? 'text-orange-400' : 'text-emerald-500'}">${w.status}</p>
                            </div>
                        </div>`;
                });
            });
        };

        window.selectMethod = (m) => {
            selectedMethod = m;
            document.querySelectorAll('.method-card').forEach(c => c.classList.remove('selected'));
            document.getElementById('method-'+m).classList.add('selected');
        };

        document.getElementById('withdraw-btn').onclick = async () => {
            const amt = parseFloat(document.getElementById('amount-input').value);
            const num = document.getElementById('number-input').value;

            if(userData.totalRefer < 15) return alert("You need 15 referrals to withdraw!");
            if(amt < 500 || isNaN(amt)) return alert("Minimum withdrawal is ৳500");
            if(amt > userData.balance) return alert("Insufficient Balance!");
            if(!num) return alert("Please enter wallet number");

            await updateDoc(doc(db, "users", userData.uid), { balance: increment(-amt) });
            await addDoc(collection(db, "withdrawals"), {
                uid: userData.uid,
                amount: amt,
                method: selectedMethod,
                number: num,
                status: "Pending",
                time: serverTimestamp()
            });
            alert("Withdrawal request submitted!");
            document.getElementById('amount-input').value = '';
            document.getElementById('number-input').value = '';
        };

        window.showPage = (id, btn) => {
            document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(btn) {
                document.querySelectorAll('.nav-btn').forEach(b => {
                    b.classList.remove('active');
                    b.classList.add('text-slate-500');
                });
                btn.classList.add('active');
                btn.classList.remove('text-slate-500');
            }
            lucide.createIcons();
        };

        window.copyReferLink = () => {
            const link = document.getElementById('refer-link').innerText;
            navigator.clipboard.writeText(link);
            alert("Referral Link Copied!");
        };

        init();
    </script>
</body>
</html>
