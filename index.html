<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Income BD - Global Enterprise</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --primary: #10b981;
            --secondary: #3b82f6;
            --bg: #030712;
            --card: rgba(17, 24, 39, 0.7);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: #f3f4f6;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.1) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.1) 0%, transparent 35%);
        }

        .blob {
            position: fixed;
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        .glass-card {
            background: var(--card);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
        }

        .earn-card {
            background: linear-gradient(145deg, rgba(16, 185, 129, 0.15), rgba(0, 0, 0, 0));
            border-left: 4px solid var(--primary);
        }

        .nav-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-active { color: var(--primary); transform: translateY(-5px); }
        .nav-active i { filter: drop-shadow(0 0 8px var(--primary)); }

        .sub-page { display: none; }
        .sub-page.active { display: block; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .progress-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            height: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }
        #ref-fill {
            background: linear-gradient(90deg, #10b981, #3b82f6);
            height: 100%;
            width: 0%;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="max-w-md mx-auto">

    <div class="blob"></div>
    
    <header class="p-5 flex justify-between items-center sticky top-0 z-50 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20">
                <i data-lucide="gem" class="text-white w-6 h-6"></i>
            </div>
            <div>
                <h1 class="font-black text-lg tracking-tight leading-none">TK <span class="text-emerald-500">INCOME</span></h1>
                <p class="text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold">Global Network</p>
            </div>
        </div>
        <div class="glass-card px-4 py-2 border-emerald-500/20 flex items-center gap-2">
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
            <span id="header-balance" class="text-emerald-400 font-black text-sm">৳ 0.00</span>
        </div>
    </header>

    <main class="p-4 pb-32">
        <div id="home-page" class="sub-page active space-y-6">
            <div class="glass-card p-8 text-center relative overflow-hidden">
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Available Balance</p>
                <h2 class="text-5xl font-black tracking-tighter text-white">৳ <span id="tk-balance">0.00</span></h2>
            </div>

            <div class="space-y-4">
                <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                    <i data-lucide="zap" class="w-4 h-4 text-emerald-500"></i> Active Earning Hub
                </h3>
                <div id="task-list" class="space-y-4"></div>
            </div>
        </div>

        <div id="refer-page" class="sub-page space-y-6">
            <div class="glass-card p-6">
                <h2 class="text-white font-black uppercase mb-4">Referral Progress</h2>
                <div class="progress-container"><div id="ref-fill"></div></div>
                <p id="refer-link-text" class="mt-4 text-[10px] font-mono text-slate-400 break-all"></p>
                <button onclick="copyRefer()" class="w-full bg-emerald-600 mt-4 py-4 rounded-2xl font-black text-sm">COPY LINK</button>
            </div>
        </div>

        <div id="wallet-page" class="sub-page space-y-6">
            <div class="glass-card p-8">
                <h2 class="text-xl font-black text-white mb-6">Payout Center</h2>
                <input id="withdraw-amount" type="number" placeholder="Enter Amount" class="w-full p-4 mb-4 rounded-2xl glass-card border-none outline-none text-white">
                <input id="payment-number" type="number" placeholder="Account Number" class="w-full p-4 mb-4 rounded-2xl glass-card border-none outline-none text-white">
                <button id="withdraw-btn" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-sm">INITIATE WITHDRAWAL</button>
            </div>
        </div>

        <div id="profile-page" class="sub-page space-y-6">
            <div class="glass-card p-10 text-center">
                <h2 id="user-name" class="text-2xl font-black text-white">Partner</h2>
                <p id="total-ref" class="text-xl font-black text-emerald-500 mt-4">0 Refers</p>
                <button onclick="contactAdmin()" class="w-full mt-6 py-4 rounded-2xl bg-white/5 border border-white/5 font-black text-xs uppercase text-slate-400">Contact Support</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 glass-card p-4 flex justify-between items-center z-[100] border-white/10 shadow-2xl">
        <button onclick="navigateTo('home-page', this)" class="nav-item nav-active px-4 flex flex-col items-center gap-1"><i data-lucide="grid"></i></button>
        <button onclick="navigateTo('refer-page', this)" class="nav-item px-4 flex flex-col items-center gap-1 text-slate-500"><i data-lucide="users-2"></i></button>
        <button onclick="navigateTo('wallet-page', this)" class="nav-item px-4 flex flex-col items-center gap-1 text-slate-500"><i data-lucide="arrow-up-right"></i></button>
        <button onclick="navigateTo('profile-page', this)" class="nav-item px-4 flex flex-col items-center gap-1 text-slate-500"><i data-lucide="settings"></i></button>
    </nav>

    <div id="timer-overlay" class="fixed inset-0 bg-slate-950/95 z-[200] hidden flex items-center justify-center p-10 backdrop-blur-md">
        <div class="glass-card p-10 w-full text-center space-y-6 border-emerald-500/30">
            <div id="timer-text" class="text-4xl font-black text-white">30</div>
            <h3 class="text-lg font-black text-white">Verifying Activity...</h3>
            <p class="text-xs text-slate-500 font-bold uppercase tracking-widest animate-pulse">Do not go back</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, updateDoc, setDoc, increment, addDoc, collection, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpH_zn1KQPcIsPojC02UzXLdc017e-Unw",
            authDomain: "bdincomezone-767b4.firebaseapp.com",
            projectId: "bdincomezone-767b4",
            storageBucket: "bdincomezone-767b4.firebasestorage.app",
            messagingSenderId: "1026541741286",
            appId: "1:1026541741286:web:735f4f134ab159b5d28727"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;
        let userData = null;
        let config = {};

        async function init() {
            lucide.createIcons();
            tg.expand();
            const user = tg.initDataUnsafe?.user;
            if(!user) return;
            const uid = user.id.toString();

            onSnapshot(doc(db, "config", "main"), (snap) => {
                config = snap.data() || {};
                if(userData) renderTasks();
            });

            onSnapshot(doc(db, "users", uid), async (snap) => {
                if(snap.exists()) {
                    userData = snap.data();
                } else {
                    userData = { uid, name: user.first_name, balance: 50, totalRefer: 0 };
                    await setDoc(doc(db, "users", uid), userData);
                    const sp = tg.initDataUnsafe?.start_param;
                    if(sp && sp !== uid) {
                        await updateDoc(doc(db, "users", sp), { balance: increment(100), totalRefer: increment(1) });
                    }
                }
                updateUI(); renderTasks();
            });
        }

        function updateUI() {
            document.getElementById('tk-balance').innerText = userData.balance.toFixed(2);
            document.getElementById('header-balance').innerText = "৳ " + userData.balance.toFixed(2);
            document.getElementById('user-name').innerText = userData.name;
            document.getElementById('total-ref').innerText = (userData.totalRefer || 0) + " Refers";
            const percentage = Math.min(100, ((userData.totalRefer || 0) / 15) * 100);
            document.getElementById('ref-fill').style.width = percentage + '%';
            document.getElementById('refer-link-text').innerText = `https://t.me/bdfreeincometkBot/app?startapp=${userData.uid}`;
        }

        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            const now = Date.now();
            const lockDuration = 20 * 60 * 60 * 1000; // 20 Hours in MS

            for(let i=1; i<=3; i++) {
                const lastDone = userData[`task${i}LastDone`]?.toMillis() || 0;
                const timeDiff = now - lastDone;

                if(lastDone > 0 && timeDiff < lockDuration) {
                    const remaining = lockDuration - timeDiff;
                    const h = Math.floor(remaining / 3600000);
                    const m = Math.floor((remaining % 3600000) / 60000);
                    list.innerHTML += `
                        <div class="glass-card p-5 flex justify-between items-center opacity-50 border-white/5">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center border border-white/5">
                                    <i data-lucide="clock" class="text-slate-500 w-6 h-6"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-black text-slate-500 uppercase tracking-tighter">Locked</p>
                                    <p class="text-[10px] text-emerald-500 font-bold uppercase tracking-widest">${h}h ${m}m Remaining</p>
                                </div>
                            </div>
                            <span class="text-[10px] font-black text-slate-600">COOLDOWN</span>
                        </div>`;
                } else {
                    list.innerHTML += `
                        <div class="glass-card p-5 flex justify-between items-center earn-card">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center border border-white/5">
                                    <i data-lucide="globe" class="text-emerald-500 w-6 h-6"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-black text-white">Enterprise Task 0${i}</p>
                                    <p class="text-[10px] text-emerald-400 font-bold uppercase">Reward: ৳ 50.00</p>
                                </div>
                            </div>
                            <button onclick="startTask(${i}, '${config['linkWeb'+i]}')" class="px-6 py-3 bg-emerald-600 rounded-xl text-[10px] font-black text-white shadow-lg shadow-emerald-500/20 active:scale-95 transition-all">START</button>
                        </div>`;
                }
            }
            lucide.createIcons();
        }

        window.startTask = (id, url) => {
            if(!url) return alert("Task Link Pending.");
            tg.openLink(url);
            const overlay = document.getElementById('timer-overlay');
            const timerText = document.getElementById('timer-text');
            overlay.classList.remove('hidden');
            let count = 30;
            const itv = setInterval(async () => {
                count--; timerText.innerText = count;
                if(count <= 0) {
                    clearInterval(itv); overlay.classList.add('hidden');
                    if(confirm("Confirm Reward Claim?")) {
                        const upd = { balance: increment(50) };
                        upd[`task${id}LastDone`] = serverTimestamp();
                        await updateDoc(doc(db, "users", userData.uid), upd);
                        tg.HapticFeedback.notificationOccurred('success');
                    }
                }
            }, 1000);
        };

        window.navigateTo = (id, btn) => {
            document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => { i.classList.add('text-slate-500'); i.classList.remove('nav-active'); });
            btn.classList.remove('text-slate-500'); btn.classList.add('nav-active');
            tg.HapticFeedback.impactOccurred('medium');
        };

        window.copyRefer = () => {
            navigator.clipboard.writeText(document.getElementById('refer-link-text').innerText);
            alert("Partner link copied to clipboard!");
            tg.HapticFeedback.notificationOccurred('success');
        };

        window.contactAdmin = () => { if(config.linkAdmin) tg.openTelegramLink("https://t.me/" + config.linkAdmin); };

        document.getElementById('withdraw-btn').onclick = async () => {
            const amt = parseFloat(document.getElementById('withdraw-amount').value);
            const num = document.getElementById('payment-number').value;
            if(userData.totalRefer < 15) return alert("Security Alert: 15 refers required to unlock withdrawals.");
            if(amt < 500 || amt > userData.balance) return alert("Invalid Amount (Min ৳500)");
            if(!num) return alert("Enter receiver number.");
            
            await updateDoc(doc(db, "users", userData.uid), { balance: increment(-amt) });
            await addDoc(collection(db, "withdrawals"), { 
                uid: userData.uid, name: userData.name, amount: amt, 
                method: document.getElementById('withdraw-method')?.value || 'General', 
                number: num, status: "Pending", time: serverTimestamp() 
            });
            alert("Transfer request successful. Awaiting verification.");
            tg.HapticFeedback.notificationOccurred('success');
        };

        init();
    </script>
</body>
</html>
