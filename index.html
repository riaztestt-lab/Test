<!DOCTYPE html>
<html>
<head>
  <title>Demo Income Site</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
    }
    .box {
      background: white;
      padding: 20px;
      margin: 50px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      background: green;
      color: white;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>💸 Demo Income Site</h2>
  
  <p>Balance: <span id="balance">0</span> ৳</p>

  <button onclick="earn()">Earn 10৳</button>
  <button onclick="withdraw()">Withdraw</button>

  <p>Your Referral Link:</p>
  <input type="text" value="https://yoursite.com/?ref=123" size="30">

</div>

<script>
let balance = 0;

function earn() {
  balance += 10;
  document.getElementById("balance").innerText = balance;
}

function withdraw() {
  if (balance >= 50) {
    alert("Withdraw Request Sent!");
    balance = 0;
    document.getElementById("balance").innerText = balance;
  } else {
    alert("Minimum 50৳ needed!");
  }
}
</script>

</body>
</html>
