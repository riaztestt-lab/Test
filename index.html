<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Income BD</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #0a0a0a; color: #ffffff; }
        .card-bg { background: linear-gradient(145deg, #161616, #1f1f1f); border: 1px solid rgba(255,255,255,0.05); }
        .btn-emerald { background: linear-gradient(to right, #10b981, #059669); color: white; font-weight: bold; }
        .sub-page { display: none; }
        .sub-page.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .nav-active { color: #10b981 !important; transform: translateY(-5px); }
        input, select { background: #000 !important; border: 1px solid #333 !important; color: #fff !important; }
    </style>
</head>
<body class="max-w-md mx-auto select-none">

    <div id="loader" class="fixed inset-0 bg-[#0a0a0a] flex flex-col items-center justify-center z-[100]">
        <div class="w-10 h-10 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin"></div>
    </div>

    <div id="app-container" class="min-h-screen flex flex-col opacity-0 transition-opacity duration-500">
        <header class="p-4 flex justify-between items-center sticky top-0 bg-[#0a0a0a]/90 backdrop-blur-md z-50 border-b border-white/5">
            <h1 class="font-black text-xl text-emerald-500">TK Income</h1>
            <div class="bg-emerald-500/10 px-4 py-1.5 rounded-full border border-emerald-500/20 flex items-center gap-2">
                <i data-lucide="wallet" class="w-4 text-emerald-400"></i>
                <span id="header-balance" class="text-emerald-400 font-bold text-sm">৳ 0.00</span>
            </div>
        </header>

        <main class="flex-grow p-4 pb-28">
            <div id="home-page" class="sub-page active space-y-6">
                <div id="broadcast-box" class="hidden bg-blue-600/10 border border-blue-500/20 p-4 rounded-2xl flex items-start gap-3">
                    <i data-lucide="megaphone" class="w-5 text-blue-500 mt-1"></i>
                    <p id="broadcast-text" class="text-sm text-blue-100"></p>
                </div>

                <div class="card-bg p-8 rounded-[2rem] text-center shadow-2xl">
                    <p class="text-xs text-gray-500 uppercase font-bold">Balance</p>
                    <h2 class="text-4xl font-black text-white mt-1">৳ <span id="tk-balance">0.00</span></h2>
                </div>

                <div id="join-task-box" class="hidden card-bg p-5 rounded-2xl border border-blue-500/20 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="bg-blue-500/20 p-2 rounded-lg"><i data-lucide="send" class="w-5 text-blue-400"></i></div>
                        <div>
                            <p class="text-xs font-bold">Official Channel</p>
                            <p class="text-[10px] text-emerald-500 font-bold">+ ৳ ৫০.০০ বোনাস</p>
                        </div>
                    </div>
                    <button onclick="joinOfficial()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl text-[10px] font-bold">JOIN NOW</button>
                </div>

                <div class="space-y-4">
                    <h3 class="font-bold flex items-center gap-2 text-gray-300"><i data-lucide="zap" class="w-5 text-yellow-500"></i> আনলিমিটেড টাস্ক</h3>
                    <div id="task-list" class="space-y-3"></div>
                </div>
            </div>

            <div id="refer-page" class="sub-page space-y-6">
                <div class="card-bg p-8 rounded-[2rem] text-center">
                    <i data-lucide="users" class="w-12 h-12 text-emerald-500 mx-auto mb-4"></i>
                    <h2 class="text-xl font-bold">রেফার ও আয়</h2>
                    <p class="text-gray-400 text-xs mt-2">প্রতি সফল রেফারে পাবেন ১০০ টাকা।</p>
                    <div class="mt-6 p-4 bg-black/40 rounded-2xl border border-white/5 break-all text-[10px] font-mono" id="refer-link-text">Loading...</div>
                    <button onclick="copyRefer()" class="w-full btn-emerald py-4 rounded-2xl mt-4 flex items-center justify-center gap-2 text-sm">
                        <i data-lucide="copy" class="w-4"></i> কপি লিঙ্ক
                    </button>
                </div>
            </div>

            <div id="wallet-page" class="sub-page space-y-5">
                <div class="card-bg p-8 rounded-[2.5rem] space-y-5">
                    <h2 class="text-2xl font-bold text-center">উইথড্র</h2>
                    <div class="bg-red-500/10 p-3 rounded-xl border border-red-500/20 text-center text-[11px] text-red-400">
                        শর্ত: কমপক্ষে ১৫টি রেফার থাকতে হবে। (আপনার রেফার: <span id="req-ref">0</span>/15)
                    </div>
                    <select id="withdraw-method" class="w-full p-4 rounded-2xl outline-none">
                        <option value="Bkash">Bkash (Personal)</option>
                        <option value="Nagad">Nagad (Personal)</option>
                    </select>
                    <input id="withdraw-amount" type="number" placeholder="পরিমাণ (৳)" class="w-full p-4 rounded-2xl outline-none">
                    <input id="payment-number" type="number" placeholder="বিকাশ/নগদ নম্বর" class="w-full p-4 rounded-2xl outline-none">
                    <button id="withdraw-btn" class="w-full py-4 rounded-2xl btn-emerald">রিকোয়েস্ট পাঠান</button>
                </div>
            </div>

            <div id="profile-page" class="sub-page space-y-6 text-center">
                <div class="card-bg p-8 rounded-[2rem]">
                    <div class="w-16 h-16 bg-emerald-500/10 rounded-full mx-auto flex items-center justify-center mb-4"><i data-lucide="user" class="w-8 text-emerald-500"></i></div>
                    <h2 id="user-name" class="text-lg font-bold">User</h2>
                    <p class="text-gray-500 text-[10px]">ID: <span id="user-id">0</span></p>
                    <div class="mt-8 grid grid-cols-2 gap-4">
                        <div class="bg-black/50 p-3 rounded-2xl border border-white/5">
                            <p class="text-[10px] text-gray-500 uppercase">Refers</p>
                            <p id="total-ref" class="text-lg font-bold">0</p>
                        </div>
                        <div onclick="contactAdmin()" class="bg-emerald-500/5 p-3 rounded-2xl border border-emerald-500/10 cursor-pointer">
                            <p class="text-[10px] text-emerald-500 uppercase">Support</p>
                            <p class="text-sm font-bold">Admin</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-[#0a0a0a] border-t border-white/5 px-6 py-5 flex justify-between items-center z-[90]">
            <button onclick="navigateTo('home-page', this)" class="nav-item nav-active"><i data-lucide="home"></i></button>
            <button onclick="navigateTo('refer-page', this)" class="nav-item text-gray-600"><i data-lucide="users"></i></button>
            <button onclick="navigateTo('wallet-page', this)" class="nav-item text-gray-600"><i data-lucide="wallet"></i></button>
            <button onclick="navigateTo('profile-page', this)" class="nav-item text-gray-600"><i data-lucide="user"></i></button>
        </nav>
    </div>

    <div id="timer-overlay" class="fixed inset-0 bg-black/98 z-[200] hidden flex flex-col items-center justify-center p-8">
        <div class="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-6"></div>
        <h3 id="timer-text" class="text-4xl font-black">30</h3>
        <p class="text-gray-500 mt-2">সাইট ভিজিট করুন...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, setDoc, increment, addDoc, collection, serverTimestamp, onSnapshot, Timestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpH_zn1KQPcIsPojC02UzXLdc017e-Unw",
            authDomain: "bdincomezone-767b4.firebaseapp.com",
            projectId: "bdincomezone-767b4",
            storageBucket: "bdincomezone-767b4.firebasestorage.app",
            messagingSenderId: "1026541741286",
            appId: "1:1026541741286:web:735f4f134ab159b5d28727"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;
        let userData = null;
        let config = {};

        async function init() {
            const user = tg.initDataUnsafe?.user;
            if(!user) return;
            const uid = user.id.toString();
            const startParam = tg.initDataUnsafe?.start_param;

            onSnapshot(doc(db, "config", "main"), (snap) => {
                config = snap.data() || {};
                const bBox = document.getElementById('broadcast-box');
                if(config.announcement) {
                    bBox.classList.remove('hidden');
                    document.getElementById('broadcast-text').innerText = config.announcement;
                }
                if(userData) renderTasks();
            });

            onSnapshot(doc(db, "users", uid), async (snap) => {
                if(snap.exists()) {
                    userData = snap.data();
                } else {
                    userData = { 
                        uid, 
                        name: user.first_name, 
                        balance: 50, 
                        totalRefer: 0, 
                        joinTaskDone: false,
                        task1LastDone: null,
                        task2LastDone: null,
                        task3LastDone: null
                    };
                    await setDoc(doc(db, "users", uid), userData);

                    if(startParam && startParam !== uid) {
                        const inviterRef = doc(db, "users", startParam);
                        const inviterSnap = await getDoc(inviterRef);
                        if(inviterSnap.exists()) {
                            await updateDoc(inviterRef, { 
                                balance: increment(100), 
                                totalRefer: increment(1) 
                            });
                        }
                    }
                }
                updateUI();
                renderTasks();
                document.getElementById('loader').style.display = 'none';
                document.getElementById('app-container').style.opacity = '1';
            });
            lucide.createIcons();
        }

        function updateUI() {
            document.getElementById('tk-balance').innerText = userData.balance.toFixed(2);
            document.getElementById('header-balance').innerText = "৳ " + userData.balance.toFixed(2);
            document.getElementById('user-name').innerText = userData.name;
            document.getElementById('user-id').innerText = userData.uid;
            document.getElementById('total-ref').innerText = userData.totalRefer || 0;
            document.getElementById('req-ref').innerText = userData.totalRefer || 0;
            
            const joinBox = document.getElementById('join-task-box');
            joinBox.classList.toggle('hidden', !!userData.joinTaskDone);

            const refLink = `https://t.me/bdfreeincometkBot/app?startapp=${userData.uid}`;
            document.getElementById('refer-link-text').innerText = refLink;
        }

        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            const now = Date.now();
            const oneDay = 24 * 60 * 60 * 1000;

            for(let i=1; i<=3; i++) {
                const lastDone = userData[`task${i}LastDone`]?.toMillis() || 0;
                const waitTime = lastDone + oneDay - now;
                
                let btn;
                if(waitTime > 0) {
                    const hours = Math.ceil(waitTime / (1000 * 60 * 60));
                    btn = `<button class="px-4 py-2.5 rounded-xl text-[10px] font-bold bg-gray-800 text-gray-500 cursor-not-allowed">${hours}h Left</button>`;
                } else {
                    btn = `<button onclick="startTask(${i}, '${config['linkWeb'+i]}')" class="px-6 py-2.5 rounded-xl text-xs font-bold btn-emerald">শুরু</button>`;
                }

                list.innerHTML += `
                <div class="card-bg p-5 rounded-2xl flex justify-between items-center">
                    <div class="flex items-center gap-4">🌐 <div><p class="font-bold text-sm">টাস্ক 0${i}</p><p class="text-xs text-emerald-500">৳ ৫০.০০</p></div></div>
                    ${btn}
                </div>`;
            }
        }

        window.startTask = (id, url) => {
            if(!url || url === 'undefined') return alert("লিঙ্ক সেট করা নেই!");
            window.open(url, "_blank");
            const overlay = document.getElementById('timer-overlay');
            overlay.classList.remove('hidden');
            let count = 30;
            document.getElementById('timer-text').innerText = count;

            const itv = setInterval(async () => {
                count--;
                document.getElementById('timer-text').innerText = count;
                if(count <= 0) {
                    clearInterval(itv);
                    overlay.classList.add('hidden');
                    if(confirm("আপনি কি লিগ্যাল ভাবে সাইটটি ভিজিট করেছেন? বোনাস নিতে OK চাপুন।")) {
                        const updateData = { balance: increment(50) };
                        updateData[`task${id}LastDone`] = serverTimestamp();
                        await updateDoc(doc(db, "users", userData.uid), updateData);
                        alert("৳ ৫০.০০ যোগ হয়েছে! আবার ২৪ ঘণ্টা পর করতে পারবেন।");
                    }
                }
            }, 1000);
        };

        window.joinOfficial = async () => {
            window.open(config.linkTelegram, "_blank");
            setTimeout(async () => {
                if(confirm("চ্যানেলে জয়েন করেছেন?")) {
                    await updateDoc(doc(db, "users", userData.uid), { balance: increment(50), joinTaskDone: true });
                }
            }, 3000);
        };

        window.copyRefer = () => {
            navigator.clipboard.writeText(document.getElementById('refer-link-text').innerText);
            alert("লিঙ্ক কপি হয়েছে!");
        };

        window.contactAdmin = () => window.open("https://t.me/" + config.linkAdmin, "_blank");

        window.navigateTo = (id, btn) => {
            document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('nav-active'));
            btn.classList.add('nav-active');
        };

        document.getElementById('withdraw-btn').onclick = async () => {
            const refCount = userData.totalRefer || 0;
            if(refCount < 15) return alert(`কমপক্ষে ১৫টি রেফার লাগবে। আপনার আছে: ${refCount}টি।`);
            
            const amt = parseFloat(document.getElementById('withdraw-amount').value);
            const num = document.getElementById('payment-number').value;
            const method = document.getElementById('withdraw-method').value;

            if(!amt || amt < 500 || amt > userData.balance) return alert("সঠিক পরিমাণ দিন (মিনিমাম ৫০০)!");
            if(!num || num.length < 10) return alert("সঠিক নম্বর দিন!");

            await updateDoc(doc(db, "users", userData.uid), { balance: increment(-amt) });
            await addDoc(collection(db, "withdrawals"), { 
                uid: userData.uid, name: userData.name, amount: amt, method, number: num, status: "Pending", time: serverTimestamp() 
            });
            alert("সফল! পেমেন্ট রিকোয়েস্ট পাঠানো হয়েছে।");
        };

        init();
    </script>
</body>
</html>
