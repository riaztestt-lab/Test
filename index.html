<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK INCOME - Official Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .sub-page { display: none; }
        .sub-page.active { display: block; animation: zoomIn 0.3s ease-out; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .nav-active { color: #10b981; }
        .status-badge { padding: 2px 8px; border-radius: 6px; font-size: 8px; text-transform: uppercase; font-weight: 900; }
        .pending { background: rgba(234, 179, 8, 0.1); color: #eab308; }
        .success { background: rgba(16, 185, 129, 0.1); color: #10b981; }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 flex justify-between items-center sticky top-0 z-50 bg-[#020617]/90 backdrop-blur-md">
        <h1 class="text-xl font-black italic uppercase">TK <span class="text-emerald-500">INCOME</span></h1>
        <div class="glass px-4 py-2 border-emerald-500/20">
            <span id="top-bal" class="text-emerald-400 font-black">৳ 0.00</span>
        </div>
    </header>

    <main class="p-5 max-w-md mx-auto">
        <div id="home-page" class="sub-page active space-y-6">
            <div class="glass p-8 text-center border-emerald-500/10">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 italic">Current Balance</p>
                <h2 class="text-5xl font-black italic text-white">৳ <span id="home-bal">0.00</span></h2>
            </div>
            <div id="main-tasks" class="space-y-3"></div>
            <div id="bonus-tasks" class="space-y-3"></div>
        </div>

        <div id="refer-page" class="sub-page space-y-6">
            <div class="glass p-8 text-center border-emerald-500/20">
                <i data-lucide="share-2" class="w-12 h-12 text-emerald-500 mx-auto mb-4"></i>
                <h2 class="text-2xl font-black italic uppercase">Team Bonus</h2>
                <p class="text-slate-400 text-xs">Reward: <span class="text-emerald-500 font-bold">৳ 70.00</span></p>
            </div>
            <div class="glass p-6 space-y-4">
                <p class="text-[10px] text-slate-500 font-bold uppercase text-center">Your Unique Link</p>
                <div id="ref-link" class="bg-black/40 p-5 rounded-2xl border border-white/5 break-all text-[10px] text-emerald-400 text-center font-bold">Please wait...</div>
                <button onclick="copyLink()" class="w-full py-4 bg-emerald-500 text-black font-black rounded-2xl text-[10px] uppercase">Copy Refer Link</button>
            </div>
        </div>

        <div id="wallet-page" class="sub-page space-y-6">
            <div class="glass p-6 space-y-4">
                <select id="gateway" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-white outline-none">
                    <option value="Bkash">Bkash Personal</option>
                    <option value="Nagad">Nagad Personal</option>
                </select>
                <input id="num" type="number" placeholder="Account Number" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-white outline-none">
                <input id="amt" type="number" placeholder="Min ৳ 500" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-white outline-none">
                <button onclick="submitWithdraw()" class="w-full py-4 bg-white text-black font-black rounded-2xl text-[10px] uppercase">Request Payout</button>
            </div>
            <div class="space-y-3">
                <h3 class="text-[10px] font-black text-slate-500 uppercase px-2">Withdraw History</h3>
                <div id="txn-history" class="space-y-3"></div>
            </div>
        </div>

        <div id="profile-page" class="sub-page space-y-6">
            <div class="glass p-10 text-center relative border-b-4 border-emerald-500">
                <div class="w-20 h-20 bg-emerald-500/20 rounded-full mx-auto flex items-center justify-center mb-4 border-2 border-emerald-500 shadow-lg">
                    <i data-lucide="user" class="w-10 h-10 text-emerald-500"></i>
                </div>
                <h2 id="u-name" class="text-2xl font-black italic">User</h2>
                <p id="u-id" class="text-[9px] text-slate-500 font-bold mt-1 uppercase">ID: 000000</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-5 text-center">
                    <p class="text-[9px] font-bold text-slate-500 uppercase italic">Refers</p>
                    <p id="p-ref" class="text-xl font-black text-white">0</p>
                </div>
                <div class="glass p-5 text-center">
                    <p class="text-[9px] font-bold text-slate-500 uppercase italic">Status</p>
                    <p class="text-xl font-black text-emerald-400 italic">ELITE</p>
                </div>
            </div>
            <button onclick="tg.close()" class="w-full glass p-4 text-red-500 font-black text-xs uppercase italic">Close App</button>
        </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 glass p-3 flex justify-around items-center z-[100] border-white/5 shadow-2xl rounded-3xl">
        <button onclick="changePage('home-page', this)" class="nav-item nav-active p-3"><i data-lucide="layout-grid"></i></button>
        <button onclick="changePage('refer-page', this)" class="nav-item text-slate-600 p-3"><i data-lucide="users"></i></button>
        <button onclick="changePage('wallet-page', this)" class="nav-item text-slate-600 p-3"><i data-lucide="wallet"></i></button>
        <button onclick="changePage('profile-page', this)" class="nav-item text-slate-600 p-3"><i data-lucide="circle-user"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, getDoc, onSnapshot, setDoc, updateDoc, increment, collection, addDoc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDpH_zn1KQPcIsPojC02UzXLdc017e-Unw", projectId: "bdincomezone-767b4" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;

        let userData = null;
        let config = {};
        const uid = tg.initDataUnsafe?.user?.id?.toString() || "dev_user";
        
        // বট ইউজারনেম সেটিংস (রেফার লিঙ্কের জন্য এটি সঠিক হওয়া জরুরি)
        const BOT_USERNAME = "bdfreeincometkBot"; 

        async function init() {
            lucide.createIcons();
            tg.expand();
            
            const userRef = doc(db, "users", uid);
            const userSnap = await getDoc(userRef);

            if (!userSnap.exists()) {
                const refBy = tg.initDataUnsafe?.start_param || null;
                await setDoc(userRef, { uid, name: tg.initDataUnsafe?.user?.first_name || "Guest", balance: 25.0, totalRefer: 0, joinedAt: serverTimestamp() });
                
                if(refBy && refBy !== uid) {
                    const rRef = doc(db, "users", refBy);
                    const rSnap = await getDoc(rRef);
                    if(rSnap.exists()) await updateDoc(rRef, { balance: increment(70), totalRefer: increment(1) });
                }
            }

            onSnapshot(userRef, (s) => { userData = s.data(); updateUI(); renderTasks(); });
            onSnapshot(doc(db, "config", "main"), (s) => { config = s.data(); renderTasks(); });
            loadHistory();
        }

        function updateUI() {
            if(!userData) return;
            document.getElementById('home-bal').innerText = userData.balance.toFixed(2);
            document.getElementById('top-bal').innerText = "৳ " + userData.balance.toFixed(2);
            document.getElementById('ref-count').innerText = userData.totalRefer;
            document.getElementById('p-ref').innerText = userData.totalRefer;
            document.getElementById('u-name').innerText = userData.name;
            document.getElementById('u-id').innerText = "ID: " + uid;
            
            // রেফার লিঙ্ক এখানে ফিক্স করা হয়েছে
            document.getElementById('ref-link').innerText = `https://t.me/${BOT_USERNAME}/app?startapp=${uid}`;
        }

        function renderTasks() {
            const mBox = document.getElementById('main-tasks');
            const bBox = document.getElementById('bonus-tasks');
            mBox.innerHTML = bBox.innerHTML = '';
            const now = Date.now();

            for(let i=1; i<=5; i++){
                const link = config[`linkWeb${i}`];
                if(!link) continue;
                let locked = false;
                let msg = "৳ 25.00 Reward";

                if(i <= 3) {
                    const last = userData[`task${i}Last`]?.toMillis() || 0;
                    if(now - last < 20 * 3600000) { locked = true; msg = `Wait ${Math.ceil((20*3600000-(now-last))/3600000)}h`; }
                    mBox.innerHTML += taskHTML(i, link, locked, msg, "emerald");
                } else {
                    const count = userData[`task${i}Count`] || 0;
                    const last = userData[`task${i}Last`]?.toMillis() || 0;
                    if(count >= 5 && (now - last < 20 * 60000)) { locked = true; msg = `Wait ${Math.ceil((20*60000-(now-last))/60000)}m`; }
                    else if(count > 0 && count < 5) { msg = `Done ${count}/5`; }
                    bBox.innerHTML += taskHTML(i, link, locked, msg, "blue");
                }
            }
            lucide.createIcons();
        }

        function taskHTML(id, link, locked, msg, color) {
            return `<div class="glass p-5 flex justify-between items-center ${locked ? 'opacity-40' : ''}">
                <div><p class="text-xs font-black italic uppercase">Mission 0${id}</p><p class="text-[9px] text-${color}-400 font-bold uppercase">${msg}</p></div>
                <button ${locked ? 'disabled' : `onclick="runTask(${id}, '${link}')"`} class="px-5 py-2 glass border-${color}-500/30 text-${color}-400 text-[10px] font-black uppercase">${locked ? 'Locked' : 'Start'}</button>
            </div>`;
        }

        window.runTask = async (id, link) => {
            tg.openLink(link);
            setTimeout(async () => {
                if(confirm("Collect reward?")) {
                    const up = { balance: increment(25), [`task${id}Last`]: serverTimestamp() };
                    if(id > 3) {
                        const cur = userData[`task${id}Count`] || 0;
                        up[`task${id}Count`] = (cur >= 5) ? 1 : increment(1);
                    }
                    await updateDoc(doc(db, "users", uid), up);
                }
            }, 3000);
        }

        window.submitWithdraw = async () => {
            const amt = parseFloat(document.getElementById('amt').value);
            const num = document.getElementById('num').value;
            const method = document.getElementById('gateway').value;
            if(userData.totalRefer < 15) return alert("System requires 15 refers!");
            if(amt < 500 || amt > userData.balance) return alert("Min withdraw ৳ 500!");
            await updateDoc(doc(db, "users", uid), { balance: increment(-amt) });
            await addDoc(collection(db, "withdrawals"), { uid, amount: amt, number: num, method, status: "Pending", time: serverTimestamp() });
            alert("Withdrawal submitted!");
            document.getElementById('amt').value = ''; document.getElementById('num').value = '';
        }

        function loadHistory() {
            // এই কুয়েরিটি আগের সব ডাটা নিয়ে আসবে
            const q = query(collection(db, "withdrawals"), where("uid", "==", uid), orderBy("time", "desc"));
            onSnapshot(q, (sn) => {
                const box = document.getElementById('txn-history');
                box.innerHTML = sn.empty ? '<p class="text-center text-[10px] text-slate-700 py-4 italic">No history yet</p>' : '';
                sn.forEach(d => {
                    const w = d.data();
                    const sCls = w.status === 'Pending' ? 'pending' : 'success';
                    box.innerHTML += `<div class="glass p-4 flex justify-between items-center text-[10px] font-bold">
                        <div><p>${w.number} (${w.method})</p><p class="text-slate-500">${w.time?.toDate().toLocaleString() || 'Recent'}</p></div>
                        <div class="text-right"><p class="text-emerald-400">৳ ${w.amount}</p><span class="status-badge ${sCls}">${w.status}</span></div>
                    </div>`;
                });
            });
        }

        window.changePage = (id, btn) => {
            document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active', 'text-emerald-400'));
            if(btn) btn.classList.add('nav-active');
            lucide.createIcons();
        }

        window.copyLink = () => { navigator.clipboard.writeText(document.getElementById('ref-link').innerText); alert("Refer Link Copied!"); }

        init();
    </script>
</body>
</html>
