<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK INCOME - Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background: radial-gradient(circle at top right, #0f172a, #020617);
            color: #f8fafc; 
            overflow-x: hidden; 
        }

        .neo-glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.07); 
            border-radius: 2rem;
        }

        .accent-border { border-left: 4px solid #10b981; }
        .sub-page { display: none; }
        .sub-page.active { display: block; animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .btn-gradient {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .status-badge { padding: 4px 10px; border-radius: 99px; font-size: 8px; font-weight: 800; text-transform: uppercase; }
        .pending { background: #78350f; color: #fbbf24; }
        .success { background: #064e3b; color: #34d399; }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 flex justify-between items-center sticky top-0 z-50 bg-[#020617]/80 backdrop-blur-xl border-b border-white/5">
        <div class="flex flex-col">
            <h1 style="font-family: 'Syncopate', sans-serif;" class="text-lg tracking-tighter text-white">TK <span class="text-emerald-500">INCOME</span></h1>
            <span class="text-[7px] font-bold tracking-[0.3em] uppercase text-emerald-500/50">Elite Protocol v3.0</span>
        </div>
        <div class="neo-glass px-4 py-2 border-emerald-500/20 flex items-center gap-2">
            <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></div>
            <span id="top-bal" class="text-sm font-bold text-emerald-400 italic">৳ 0.00</span>
        </div>
    </header>

    <main class="p-5 max-w-md mx-auto">
        
        <div id="home-page" class="sub-page active space-y-6">
            <a href="https://t.me/your_group_link" id="official-group-link" class="neo-glass p-4 flex items-center justify-between border-l-4 border-blue-500 group active:scale-95 transition-all">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-blue-500/10 rounded-full flex items-center justify-center">
                        <i data-lucide="message-circle" class="w-5 h-5 text-blue-400"></i>
                    </div>
                    <div>
                        <h4 class="text-[11px] font-black uppercase tracking-widest text-white">Official Group</h4>
                        <p class="text-[8px] text-slate-500 uppercase">Join for Latest Updates</p>
                    </div>
                </div>
                <i data-lucide="external-link" class="w-4 h-4 text-slate-600"></i>
            </a>

            <div class="neo-glass p-10 text-center balance-card bg-emerald-500/5 border border-emerald-500/20">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-2">TK INCOME BALANCE</p>
                <h2 class="text-6xl font-black italic tracking-tighter text-white">৳ <span id="home-bal">0.00</span></h2>
            </div>
            
            <div class="space-y-4">
                <div class="flex items-center gap-2 px-2">
                    <div class="w-1 h-4 bg-emerald-500 rounded-full"></div>
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Mining Protocol</h3>
                </div>
                <div id="main-tasks" class="space-y-3"></div>
            </div>
        </div>

        <div id="refer-page" class="sub-page space-y-6">
            <div class="neo-glass p-8 text-center border-b-2 border-emerald-500/30">
                <div class="w-16 h-16 bg-emerald-500/10 rounded-3xl flex items-center justify-center mx-auto mb-4 border border-emerald-500/20 shadow-inner">
                    <i data-lucide="users" class="w-8 h-8 text-emerald-500"></i>
                </div>
                <h2 class="text-2xl font-bold italic tracking-tighter uppercase">Refer System</h2>
                <p class="text-slate-400 text-xs">Unlock <span class="text-emerald-400 font-bold">৳ 70.00</span> per valid node</p>
            </div>
            <div class="neo-glass p-6 space-y-5">
                <div class="space-y-2">
                    <p class="text-[9px] text-slate-500 font-black uppercase text-center tracking-widest">Your Refer Link</p>
                    <div id="ref-link" class="bg-black/50 p-5 rounded-2xl border border-white/5 break-all text-[10px] text-emerald-400 text-center font-mono">Loading...</div>
                </div>
                <button onclick="copyLink()" class="w-full py-4 btn-gradient text-white font-black rounded-2xl text-[11px] uppercase tracking-widest">Copy Refer Link</button>
            </div>
        </div>

        <div id="wallet-page" class="sub-page space-y-6">
            <div class="neo-glass p-6 space-y-4 border-t-2 border-emerald-500/30">
                <h3 class="text-center font-black text-white italic tracking-tighter">TK INCOME PAYOUT</h3>
                <select id="gateway" class="w-full bg-slate-900/50 border border-white/10 p-4 rounded-2xl text-white font-bold outline-none focus:border-emerald-500/50 text-sm">
                    <option value="Bkash">Bkash Personal</option>
                    <option value="Nagad">Nagad Personal</option>
                </select>
                <input id="num" type="number" placeholder="01XXXXXXXXX" class="w-full bg-slate-900/50 border border-white/10 p-4 rounded-2xl text-white outline-none text-sm">
                <input id="amt" type="number" placeholder="Amount (Min 500)" class="w-full bg-slate-900/50 border border-white/10 p-4 rounded-2xl text-white outline-none text-sm">
                <button onclick="submitWithdraw()" class="w-full py-4 bg-white text-black font-black rounded-2xl text-[11px] uppercase tracking-widest">Withdraw Funds</button>
            </div>

            <div class="space-y-3">
                <h3 class="text-[10px] font-black text-slate-500 uppercase px-2 tracking-widest italic">History</h3>
                <div id="txn-history" class="space-y-3"></div>
            </div>
        </div>

        <div id="profile-page" class="sub-page space-y-6">
            <div class="neo-glass p-8 text-center border-b-4 border-emerald-500">
                <div class="w-20 h-20 bg-emerald-500/20 rounded-full mx-auto flex items-center justify-center mb-4 border border-emerald-500/40">
                    <i data-lucide="user" class="w-10 h-10 text-emerald-500"></i>
                </div>
                <h2 id="u-name" class="text-2xl font-black italic tracking-tighter text-white">TK INCOME AGENT</h2>
                <p id="u-id" class="text-[9px] text-slate-500 font-bold mt-1">UID-000000</p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="neo-glass p-6 text-center accent-border">
                    <p class="text-[9px] font-bold text-slate-500 uppercase">Total Refer</p>
                    <p id="p-ref" class="text-2xl font-black text-white">0</p>
                </div>
                <div class="neo-glass p-6 text-center border-l-4 border-emerald-500">
                    <p class="text-[9px] font-bold text-slate-500 uppercase">System Status</p>
                    <p class="text-sm font-black text-emerald-400 italic uppercase">Active</p>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 neo-glass p-2 flex justify-around items-center z-[100] border-white/10 shadow-2xl bg-[#020617]/90">
        <button onclick="changePage('home-page', this)" class="nav-item text-emerald-500 p-4"><i data-lucide="home" class="w-5 h-5"></i></button>
        <button onclick="changePage('refer-page', this)" class="nav-item text-slate-500 p-4"><i data-lucide="share-2" class="w-5 h-5"></i></button>
        <button onclick="changePage('wallet-page', this)" class="nav-item text-slate-500 p-4"><i data-lucide="wallet" class="w-5 h-5"></i></button>
        <button onclick="changePage('profile-page', this)" class="nav-item text-slate-500 p-4"><i data-lucide="user" class="w-5 h-5"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, getDoc, onSnapshot, setDoc, updateDoc, increment, collection, addDoc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDpH_zn1KQPcIsPojC02UzXLdc017e-Unw", projectId: "bdincomezone-767b4" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;

        let userData = null;
        let config = {};
        const uid = tg.initDataUnsafe?.user?.id?.toString() || "dev_user";
        const BOT_USERNAME = "bdfreeincometkBot"; 

        async function init() {
            lucide.createIcons();
            tg.expand();
            
            document.getElementById('ref-link').innerText = `https://t.me/${BOT_USERNAME}/app?startapp=${uid}`;

            const userRef = doc(db, "users", uid);
            const userSnap = await getDoc(userRef);

            if (!userSnap.exists()) {
                const refBy = tg.initDataUnsafe?.start_param || null;
                await setDoc(userRef, { uid, name: tg.initDataUnsafe?.user?.first_name || "Agent", balance: 25.0, totalRefer: 0, joinedAt: serverTimestamp() });
                if(refBy && refBy !== uid) {
                    const rRef = doc(db, "users", refBy);
                    const rSnap = await getDoc(rRef);
                    if(rSnap.exists()) await updateDoc(rRef, { balance: increment(70), totalRefer: increment(1) });
                }
            }

            // Official Group link from config or static
            onSnapshot(doc(db, "config", "main"), (s) => { 
                config = s.data(); 
                if(config?.officialGroup) document.getElementById('official-group-link').href = config.officialGroup;
                renderTasks(); 
            });

            onSnapshot(userRef, (s) => { userData = s.data(); updateUI(); renderTasks(); });
            loadHistory();
        }

        function updateUI() {
            if(!userData) return;
            const b = userData.balance.toFixed(2);
            document.getElementById('home-bal').innerText = b;
            document.getElementById('top-bal').innerText = "৳ " + b;
            document.getElementById('p-ref').innerText = userData.totalRefer;
            document.getElementById('u-name').innerText = userData.name;
            document.getElementById('u-id').innerText = "UID-" + uid;
        }

        function renderTasks() {
            const mBox = document.getElementById('main-tasks');
            if(!mBox) return;
            mBox.innerHTML = '';
            const now = Date.now();

            for(let i=1; i<=5; i++){
                const link = config[`linkWeb${i}`];
                if(!link) continue;
                let locked = false;
                const last = userData[`task${i}Last`]?.toMillis() || 0;
                
                // 20 Hours Cooldown
                if(now - last < 20 * 3600000) locked = true;

                mBox.innerHTML += `<div class="neo-glass p-5 flex justify-between items-center ${locked ? 'opacity-40' : 'accent-border'}">
                    <div>
                        <p class="text-[9px] font-black italic uppercase text-slate-500 text-emerald-500">TK INCOME TASK 0${i}</p>
                        <p class="text-[10px] text-white font-bold uppercase">REWARD: ৳ 25.00</p>
                    </div>
                    <button ${locked ? 'disabled' : `onclick="runTask(${i}, '${link}')"`} class="px-6 py-2 rounded-xl bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-[9px] font-black uppercase">
                        ${locked ? 'WAITING' : 'START'}
                    </button>
                </div>`;
            }
            lucide.createIcons();
        }

        window.runTask = async (id, link) => {
            tg.openLink(link);
            setTimeout(async () => {
                if(confirm("Collect TK INCOME Reward?")) {
                    await updateDoc(doc(db, "users", uid), { 
                        balance: increment(25), 
                        [`task${id}Last`]: serverTimestamp() 
                    });
                    tg.HapticFeedback.notificationOccurred('success');
                }
            }, 5000);
        }

        window.submitWithdraw = async () => {
            const amt = parseFloat(document.getElementById('amt').value);
            const num = document.getElementById('num').value;
            const method = document.getElementById('gateway').value;
            if(userData.totalRefer < 15) return alert("You need 15 refers to withdraw!");
            if(amt < 500 || amt > userData.balance) return alert("Invalid amount or insufficient balance!");
            
            await updateDoc(doc(db, "users", uid), { balance: increment(-amt) });
            await addDoc(collection(db, "withdrawals"), { uid, amount: amt, number: num, method, status: "Pending", time: serverTimestamp() });
            alert("Withdrawal Request Sent to TK INCOME Admin!");
            document.getElementById('amt').value = ''; 
            document.getElementById('num').value = '';
        }

        function loadHistory() {
            const q = query(collection(db, "withdrawals"), where("uid", "==", uid), orderBy("time", "desc"));
            onSnapshot(q, (sn) => {
                const box = document.getElementById('txn-history');
                box.innerHTML = sn.empty ? '<p class="text-center text-[9px] text-slate-700 py-6 uppercase">No History</p>' : '';
                sn.forEach(d => {
                    const w = d.data();
                    box.innerHTML += `<div class="neo-glass p-4 flex justify-between items-center text-[10px] font-bold">
                        <div><p class="text-white">${w.number} (${w.method})</p></div>
                        <div class="text-right"><p class="text-emerald-400 font-black italic">৳ ${w.amount}</p><span class="status-badge ${w.status === 'Pending' ? 'pending' : 'success'}">${w.status}</span></div>
                    </div>`;
                });
            });
        }

        window.changePage = (id, btn) => {
            document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('text-emerald-500'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.add('text-slate-500'));
            btn.classList.remove('text-slate-500');
            btn.classList.add('text-emerald-500');
            lucide.createIcons();
            tg.HapticFeedback.impactOccurred('light');
        }

        window.copyLink = () => { 
            navigator.clipboard.writeText(document.getElementById('ref-link').innerText); 
            alert("Refer Link Copied!"); 
            tg.HapticFeedback.impactOccurred('medium');
        }

        init();
    </script>
</body>
</html>
